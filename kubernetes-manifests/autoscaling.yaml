---
# ms-tutorias: maxReplicas más bajo a propósito. Es el orquestador de la Saga y corre tres
# procesos de fondo (outbox.publisher, compensacion.worker, reconciliacion.worker). Cada réplica
# nueva agrega otra copia de esos pollers compitiendo por las mismas filas PENDIENTE: hoy la
# exclusión depende del SELECT ... FOR UPDATE SKIP LOCKED del repositorio, no de un líder electo.
# Escalarlo agresivamente multiplica la contención en la base antes que la capacidad de atender
# requests. Issue abierto: separar los workers del proceso HTTP para poder escalarlos por separado.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ms-tutorias-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ms-tutorias-deployment
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ms-tutorias-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ms-tutorias

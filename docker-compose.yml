# docker-compose.yml
#
# Cambios del Equipo 5 (Deployment) — issue "Arranque ordenado y auto-recuperación":
#   - restart: unless-stopped en todos los servicios (auto-recuperación ante caídas).
#   - healthcheck en las 4 bases de datos y RabbitMQ.
#   - depends_on con condition: service_healthy para eliminar la carrera de arranque.
#   - Imágenes de Prometheus y Grafana fijadas a versión (reproducibilidad; eran :latest).
#   - Sincronización de variables (drift): ms-auth recibía cero variables de BD (su db.js caía a
#     localhost) y ms-usuarios/ms-agenda validan JWT en su middleware pero no recibían JWT_SECRET.

services:
  # --- Servicio de Autenticación ---
  ms-auth:
    # Equipo 5 (D1 de la auditoria): healthcheck propio. Antes estos servicios solo se
    # beneficiaban de la salud ajena (esperaban BD/broker sanos) pero nadie verificaba la suya:
    # un proceso vivo pero sin responder HTTP figuraba como 'Up' y compose lo daba por bueno.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:4000/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    build: ./ms-auth
    # Equipo 5: el build se etiqueta con la MISMA imagen que publicamos en GHCR y que
    # referencian los manifiestos de K8s. Asi compose, el push y el cluster corren el
    # mismo artefacto: se elimina el drift entre entornos. IMAGE_TAG = SHA corto del commit.
    image: ghcr.io/elcbas/ms-auth:${IMAGE_TAG:-0ab70dc}
    restart: unless-stopped
    ports:
      - "4000:4000" # Mapea el puerto 4000 de tu máquina al 4000 del contenedor
    environment:
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:?Definí JWT_SECRET en tu .env raíz}
      - JWT_EXPIRES_IN=1h
      - SERVICE_NAME=MS_Auth
      # --- OpenTelemetry (trazas distribuidas) ---
      - OTEL_SERVICE_NAME=ms-auth
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      # --- VARIABLES PARA LA BD (Equipo 5: faltaban; db.js caía al default localhost) ---
      - DB_HOST=db-auth
      - DB_PORT=5432
      - DB_USER=user_auth
      - DB_PASSWORD=${AUTH_DB_PASSWORD:?Definí AUTH_DB_PASSWORD en tu .env raíz}
      - DB_NAME=db_auth
    depends_on:
      db-auth:
        condition: service_healthy

  # --- Servicio de Usuarios ---
  ms-usuarios:
    # Equipo 5 (D1 de la auditoria): healthcheck propio. Antes estos servicios solo se
    # beneficiaban de la salud ajena (esperaban BD/broker sanos) pero nadie verificaba la suya:
    # un proceso vivo pero sin responder HTTP figuraba como 'Up' y compose lo daba por bueno.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3001/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    build: ./ms-usuarios
    # Equipo 5: el build se etiqueta con la MISMA imagen que publicamos en GHCR y que
    # referencian los manifiestos de K8s. Asi compose, el push y el cluster corren el
    # mismo artefacto: se elimina el drift entre entornos. IMAGE_TAG = SHA corto del commit.
    image: ghcr.io/elcbas/ms-usuarios:${IMAGE_TAG:-0ab70dc}
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      # ---  VARIABLES PARA LA BD ---
      - DB_HOST=db-usuarios # El nombre del servicio de la BD en Docker Compose
      - DB_PORT=5432
      - DB_USER=user_usuarios
      - DB_PASSWORD=${USUARIOS_DB_PASSWORD:?Definí USUARIOS_DB_PASSWORD en tu .env raíz}
      - DB_NAME=db_usuarios
      - SERVICE_NAME=MS_Usuarios
      # --- OpenTelemetry (trazas distribuidas) ---
      - OTEL_SERVICE_NAME=ms-usuarios
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:-rabbit}:${RABBITMQ_DEFAULT_PASS:-rabbit}@rabbitmq:5672
      # Equipo 5: el middleware JWT agregado por el Equipo 3 necesita este secreto (config/index.js
      # no define default para jwtSecret; sin esta variable, toda validación de token fallaría).
      - JWT_SECRET=${JWT_SECRET:?Definí JWT_SECRET en tu .env raíz}
    depends_on:
      # Espera a que la BD y el broker estén SANOS, no solo encendidos (elimina la carrera de arranque)
      db-usuarios:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # --- Servicio de Agenda ---
  ms-agenda:
    # Equipo 5 (D1 de la auditoria): healthcheck propio. Antes estos servicios solo se
    # beneficiaban de la salud ajena (esperaban BD/broker sanos) pero nadie verificaba la suya:
    # un proceso vivo pero sin responder HTTP figuraba como 'Up' y compose lo daba por bueno.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3002/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    build: ./ms-agenda
    # Equipo 5: el build se etiqueta con la MISMA imagen que publicamos en GHCR y que
    # referencian los manifiestos de K8s. Asi compose, el push y el cluster corren el
    # mismo artefacto: se elimina el drift entre entornos. IMAGE_TAG = SHA corto del commit.
    image: ghcr.io/elcbas/ms-agenda:${IMAGE_TAG:-0ab70dc}
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      # ---  VARIABLES PARA LA BD, similar a ms-usuarios ---
      - DB_HOST=db-agenda # Nombre del servicio de BD
      - DB_PORT=5432
      - DB_USER=user_agenda
      - DB_PASSWORD=${AGENDA_DB_PASSWORD:?Definí AGENDA_DB_PASSWORD en tu .env raíz}
      - DB_NAME=db_agenda
      - SERVICE_NAME=MS_Agenda
      # --- OpenTelemetry (trazas distribuidas) ---
      - OTEL_SERVICE_NAME=ms-agenda
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:-rabbit}:${RABBITMQ_DEFAULT_PASS:-rabbit}@rabbitmq:5672
      # Equipo 5: mismo caso que ms-usuarios — el middleware JWT del Equipo 3 requiere el secreto.
      - JWT_SECRET=${JWT_SECRET:?Definí JWT_SECRET en tu .env raíz}
    depends_on:
      db-agenda:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # --- Servicio de Message Broker ---
  rabbitmq:
    image: rabbitmq:3.13-management-alpine # Imagen con interfaz de gestión
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672" # Puerto AMQP para los servicios
      - "15672:15672" # Puerto para la interfaz web de gestión
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:?Definí RABBITMQ_DEFAULT_USER en tu .env raíz}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:?Definí RABBITMQ_DEFAULT_PASS en tu .env raíz}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  # --- Servicio de Notificaciones ---
  ms-notificaciones:
    # Equipo 5 (D1 de la auditoria): healthcheck propio. Antes estos servicios solo se
    # beneficiaban de la salud ajena (esperaban BD/broker sanos) pero nadie verificaba la suya:
    # un proceso vivo pero sin responder HTTP figuraba como 'Up' y compose lo daba por bueno.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3003/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    build: ./ms-notificaciones
    # Equipo 5: el build se etiqueta con la MISMA imagen que publicamos en GHCR y que
    # referencian los manifiestos de K8s. Asi compose, el push y el cluster corren el
    # mismo artefacto: se elimina el drift entre entornos. IMAGE_TAG = SHA corto del commit.
    image: ghcr.io/elcbas/ms-notificaciones:${IMAGE_TAG:-0ab70dc}
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:-rabbit}:${RABBITMQ_DEFAULT_PASS:-rabbit}@rabbitmq:5672 # URL de conexión a RabbitMQ
      - SERVICE_NAME=MS_Notificaciones
      # --- Equipo 5 (19/07): VARIABLES DE BD. Faltaban por completo. ---
      # src/config/db.js las lee para construir el Pool de pg; sin ellas host queda undefined
      # y node-postgres cae a 'localhost', que dentro del contenedor no tiene Postgres.
      # Se detecto al revisar el merge, no en ejecucion: el fallo aparece recien en la primera
      # notificacion que intenta deduplicar por correlation_id.
      - DB_HOST=db-notificaciones
      - DB_PORT=5432
      - DB_USER=user_notificaciones
      - DB_PASSWORD=${NOTIFICACIONES_DB_PASSWORD:?Definí NOTIFICACIONES_DB_PASSWORD en tu .env raíz}
      - DB_NAME=db_notificaciones
      # --- Equipo 5 (20/07): JWT_SECRET. Faltaba SOLO en compose; en K8s ya estaba. ---
      # El merge del Equipo 2 agrego jwt.middleware.js y lo monto en POST /notificaciones/:canal.
      # El middleware hace jwt.verify(token, config.jwtSecret); con la variable ausente el
      # secreto llega undefined, jwt.verify lanza, el catch responde 401 y TODO token valido
      # se rechaza. Los otros 4 microservicios ya la tenian: este quedo fuera al agregarse
      # el middleware despues. Asimetria compose/K8s: el mismo token funcionaba en el cluster
      # y fallaba en compose.
      - JWT_SECRET=${JWT_SECRET:?Definí JWT_SECRET en tu .env raíz}
      # --- OpenTelemetry (trazas distribuidas) ---
      - OTEL_SERVICE_NAME=ms-notificaciones
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      rabbitmq:
        condition: service_healthy # Espera a que RabbitMQ responda, no solo a que arranque
      # Equipo 5: el repositorio de logs escribe desde el primer mensaje consumido, asi que la
      # base tiene que estar SANA antes de arrancar, no solo encendida.
      db-notificaciones:
        condition: service_healthy

  # --- Proxy para Chaos Engineering ---
  toxiproxy:
    # Equipo 5: healthcheck con CMD (no CMD-SHELL). La imagen no tiene shell, pero SI trae su
    # propio cliente: /toxiproxy-cli. CMD ejecuta el binario directo, sin pasar por un shell.
    # Comprobado:  docker exec toxiproxy /toxiproxy-cli list  -> lista los proxies, exit 0
    # Es mejor que un chequeo de socket: no solo confirma que el puerto 8474 escucha, sino que
    # la API de administracion responde y devuelve la configuracion de proxies.
    # Correccion honesta: antes se documento que este servicio 'no podia' tener healthcheck por
    # falta de shell. La conclusion correcta era 'no puede con CMD-SHELL'; CMD siempre estuvo
    # disponible y no se evaluo.
    healthcheck:
      test: ["CMD", "/toxiproxy-cli", "list"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    image: ghcr.io/shopify/toxiproxy:2.5.0
    container_name: toxiproxy
    restart: unless-stopped
    command: ["-host=0.0.0.0", "-config=/config/toxiproxy.json"]
    ports:
      - "8474:8474" # API de control
      - "8001:8001" # Puerto proxy para ms-usuarios
    volumes:
      - ./toxiproxy.json:/config/toxiproxy.json:ro
    depends_on:
      ms-usuarios:
        condition: service_started

  # --- Servicio de Tutorías (El Orquestador) ---
  ms-tutorias:
    # Equipo 5 (D1 de la auditoria): healthcheck propio. Antes estos servicios solo se
    # beneficiaban de la salud ajena (esperaban BD/broker sanos) pero nadie verificaba la suya:
    # un proceso vivo pero sin responder HTTP figuraba como 'Up' y compose lo daba por bueno.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    build: ./ms-tutorias
    # Equipo 5: el build se etiqueta con la MISMA imagen que publicamos en GHCR y que
    # referencian los manifiestos de K8s. Asi compose, el push y el cluster corren el
    # mismo artefacto: se elimina el drift entre entornos. IMAGE_TAG = SHA corto del commit.
    image: ghcr.io/elcbas/ms-tutorias:${IMAGE_TAG:-0ab70dc}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # --- CAMBIO CRÍTICO DE NETWORKING - Identificacion y Nombramiento de Servicios ---
      # Dentro de la red de Docker, los servicios se comunican usando su nombre de servicio,
      # no 'localhost'. Docker Compose se encarga de resolver estos nombres.
      # Ruta por defecto para PC03 Mission 2: ms-tutorias -> Toxiproxy -> ms-usuarios.
      # Para uso normal sin chaos, cambiar a: http://ms-usuarios:3001/usuarios
      - MS_USUARIOS_URL=http://toxiproxy:8001/usuarios
      - MS_AGENDA_URL=http://ms-agenda:3002/agenda
      - MS_NOTIFICACIONES_URL=http://ms-notificaciones:3003/notificaciones
      - JWT_SECRET=${JWT_SECRET:?Definí JWT_SECRET en tu .env raíz}
      # --- VARIABLES DE LA BD PARA TUTORÍAS ---
      - DB_HOST=db-tutorias
      - DB_PORT=5432
      - DB_USER=user_tutorias
      - DB_PASSWORD=${TUTORIAS_DB_PASSWORD:?Definí TUTORIAS_DB_PASSWORD en tu .env raíz}
      - DB_NAME=db_tutorias
      - SERVICE_NAME=MS_Tutorias
      # --- OpenTelemetry (trazas distribuidas) ---
      - OTEL_SERVICE_NAME=ms-tutorias
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:-rabbit}:${RABBITMQ_DEFAULT_PASS:-rabbit}@rabbitmq:5672 # URL de conexión a RabbitMQ
    depends_on:
      ms-auth:
        condition: service_started
      ms-usuarios:
        condition: service_started
      ms-agenda:
        condition: service_started
      ms-notificaciones:
        condition: service_started
      db-tutorias:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy # El broker sano antes de publicar eventos
      toxiproxy:
        condition: service_started # Permite enrutar ms-usuarios mediante el proxy de chaos

  # --- Cliente Web Interactivo ---
  client-sim:
    # Equipo 5 (D1 de la auditoria): healthcheck propio. Antes estos servicios solo se
    # beneficiaban de la salud ajena (esperaban BD/broker sanos) pero nadie verificaba la suya:
    # un proceso vivo pero sin responder HTTP figuraba como 'Up' y compose lo daba por bueno.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    build: ./client-mobile-sim
    container_name: client_sim_web
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # URLs que apuntan a los nombres de servicio de Docker Compose
      - API_BASE_URL=http://ms-tutorias:3000
      - AUTH_SERVICE_URL=http://ms-auth:4000/auth
    depends_on:
      ms-auth:
        condition: service_started
      ms-tutorias:
        condition: service_started

  # --- Dashboard de Trazabilidad ---
  tracking-dashboard:
    # Equipo 5 (D1 de la auditoria): healthcheck propio. Antes estos servicios solo se
    # beneficiaban de la salud ajena (esperaban BD/broker sanos) pero nadie verificaba la suya:
    # un proceso vivo pero sin responder HTTP figuraba como 'Up' y compose lo daba por bueno.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    build: ./tracking-dashboard
    container_name: tracking_dashboard
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - PORT=9000
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:?Definí RABBITMQ_DEFAULT_USER en tu .env raíz}:${RABBITMQ_DEFAULT_PASS:?Definí RABBITMQ_DEFAULT_PASS en tu .env raíz}@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy

  # --- Servicio de Base de Datos PostgreSQL ---
  # --- Base de datos de Notificaciones ---
  # Equipo 5: servicio AGREGADO el 19/07 tras detectar drift en el merge del Equipo 2.
  # ms-notificaciones incorporo src/config/db.js y logNotificacion.repository.js, que hacen
  # INSERT/SELECT sobre 'logs_notificacion' en cada notificacion (deduplicacion por
  # correlation_id). Pero no existia ninguna base para ese servicio: el Pool arrancaba con
  # host=undefined y caia al default 'localhost' dentro del contenedor -> connection refused.
  # Ademas ya existia docker/init/notificaciones/ sin ninguna base que lo montara.
  # Es el mismo patron del primer hallazgo (ms-auth sin variables de BD), repetido con otro
  # servicio y otro equipo: el codigo declara una dependencia que el despliegue no provee.
  db-notificaciones:
    image: postgres:14-alpine
    container_name: db_notificaciones_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user_notificaciones
      POSTGRES_PASSWORD: ${NOTIFICACIONES_DB_PASSWORD:?Definí NOTIFICACIONES_DB_PASSWORD en tu .env raíz}
      POSTGRES_DB: db_notificaciones
    ports:
      - "5436:5432" # Siguiente puerto libre: las otras cuatro usan 5432-5435
    volumes:
      - postgres_data_notificaciones:/var/lib/postgresql/data
      - ./docker/init/notificaciones:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_notificaciones -d db_notificaciones"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-auth:
    image: postgres:14-alpine
    container_name: db_auth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user_auth
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:?Definí AUTH_DB_PASSWORD en tu .env raíz}
      POSTGRES_DB: db_auth
    ports:
      - "5435:5432" # Puerto propio para evitar conflicto con las demás BD (5432-5434)
    volumes:
      - postgres_data_auth:/var/lib/postgresql/data
      # Equipo 5: esquema versionado y ejecutable. Postgres corre todo .sql de
      # /docker-entrypoint-initdb.d/ en la PRIMERA inicializacion del volumen, asi que un
      # 'down -v' o un clon nuevo del repo ya no dejan la base sin tablas.
      - ./docker/init/auth:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_auth -d db_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-usuarios:
    image: postgres:14-alpine # Usamos una imagen oficial de PostgreSQL
    container_name: db_usuarios_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user_usuarios # Define el usuario de la BD
      POSTGRES_PASSWORD: ${USUARIOS_DB_PASSWORD:?Definí USUARIOS_DB_PASSWORD en tu .env raíz}
      POSTGRES_DB: db_usuarios # Define el nombre de la base de datos
    ports:
      - "5432:5432" # Expone el puerto 5432 en el host y 5432 para el Postgres dentro del contenedor
    volumes:
      - postgres_data_usuarios:/var/lib/postgresql/data # Persiste los datos fuera del contenedor
      # Equipo 5: esquema versionado y ejecutable. Postgres corre todo .sql de
      # /docker-entrypoint-initdb.d/ en la PRIMERA inicializacion del volumen, asi que un
      # 'down -v' o un clon nuevo del repo ya no dejan la base sin tablas.
      - ./docker/init/usuarios:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_usuarios -d db_usuarios"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-agenda:
    image: postgres:14-alpine
    container_name: db_agenda_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user_agenda
      POSTGRES_PASSWORD: ${AGENDA_DB_PASSWORD:?Definí AGENDA_DB_PASSWORD en tu .env raíz}
      POSTGRES_DB: db_agenda
    ports:
      - "5433:5432" # Mapeamos al puerto 5433 en el host para evitar conflicto con db-usuarios (5432)
    volumes:
      - postgres_data_agenda:/var/lib/postgresql/data
      # Equipo 5: esquema versionado y ejecutable. Postgres corre todo .sql de
      # /docker-entrypoint-initdb.d/ en la PRIMERA inicializacion del volumen, asi que un
      # 'down -v' o un clon nuevo del repo ya no dejan la base sin tablas.
      - ./docker/init/agenda:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_agenda -d db_agenda"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-tutorias:
    image: postgres:14-alpine
    container_name: db_tutorias_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user_tutorias
      POSTGRES_PASSWORD: ${TUTORIAS_DB_PASSWORD:?Definí TUTORIAS_DB_PASSWORD en tu .env raíz}
      POSTGRES_DB: db_tutorias
    ports:
      - "5434:5432" # Se mapea el puerto 5434 en el host para evitar conflicto con db-usuarios (5432)
    volumes:
      - postgres_data_tutorias:/var/lib/postgresql/data
      # Equipo 5: esquema versionado y ejecutable. Postgres corre todo .sql de
      # /docker-entrypoint-initdb.d/ en la PRIMERA inicializacion del volumen, asi que un
      # 'down -v' o un clon nuevo del repo ya no dejan la base sin tablas.
      - ./docker/init/tutorias:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_tutorias -d db_tutorias"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- MONITORIZACIÓN ---
  tempo:
    # Equipo 5: healthcheck agregado tras VERIFICAR que la imagen tiene shell y wget
    #   docker run --rm --entrypoint sh grafana/tempo:2.5.0 -c 'command -v wget'  -> /usr/bin/wget
    # Antes lo habia descartado asumiendo que era distroless, sin comprobarlo. La suposicion era
    # falsa: el mismo error de dar por hecho lo que no se ejecuta.
    # /ready es el endpoint de readiness de Tempo (distinto de /status, que responde siempre).
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3200/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    # Version fijada por el Equipo 4 (2.5.0): corresponde a su tempo.yaml con wal y compactor.
    # Se prefiere su tag explicito antes que el digest de :latest que habiamos fijado, porque la
    # configuracion nueva esta escrita y probada contra esta version.
    image: grafana/tempo:2.5.0
    # Equipo 5: politica de reinicio. Sin esto, si el proceso muere el contenedor queda caido y
    # se pierde la traza distribuida en silencio.
    restart: unless-stopped
    container_name: tempo
    user: "0:0"
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"
  otel-collector:
    # Version fijada por el Equipo 4 (0.108.0). Mismo criterio que tempo: su tag explicito.
    image: otel/opentelemetry-collector-contrib:0.108.0
    # Equipo 5: politica de reinicio.
    restart: unless-stopped
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      tempo:
        condition: service_healthy
  prometheus:
    # Equipo 5 (D1 de la auditoria): healthcheck propio. Antes estos servicios solo se
    # beneficiaban de la salud ajena (esperaban BD/broker sanos) pero nadie verificaba la suya:
    # un proceso vivo pero sin responder HTTP figuraba como 'Up' y compose lo daba por bueno.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    # Equipo 5: versión fijada (era :latest, build no reproducible)
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml
    ports:
      - "9091:9090"
    depends_on:
      ms-tutorias:
        condition: service_started # Esperar a que al menos uno arranque

  grafana:
    # Equipo 5 (D1 de la auditoria): healthcheck propio. Antes estos servicios solo se
    # beneficiaban de la salud ajena (esperaban BD/broker sanos) pero nadie verificaba la suya:
    # un proceso vivo pero sin responder HTTP figuraba como 'Up' y compose lo daba por bueno.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    # Equipo 5: versión fijada (era :latest, build no reproducible)
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3005:3000" # Mapeamos al 3005 para no chocar con ms-tutorias (3000)
    environment:
      # Equipo 5: restaurada la guarda del Equipo 3. Con ':-local-dev-admin' Grafana levantaba con
      # una password conocida y publicada en el repo si nadie definia la variable. Con ':?' el
      # compose se niega a arrancar: falla ruidosamente en vez de quedar inseguro en silencio.
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Definí GRAFANA_ADMIN_PASSWORD en tu .env raíz}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started

  # --- LOGS CENTRALIZADOS (Loki + Promtail) — Equipo 4 ---
  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    # Equipo 5: politica de reinicio y healthcheck. Si Loki cae, Promtail sigue leyendo logs y los
    # descarta: se pierden sin error visible. /ready es el endpoint de readiness de Loki.
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "3100:3100" # API de Loki (para pegar "queries" directo)
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    # Equipo 5: healthcheck sin wget ni curl. Verificacion de lo que la imagen SI tiene:
    #   command -v wget / curl / nc  -> ninguno
    #   bash + /dev/tcp              -> disponibles (probado contra un host externo)
    # bash abre sockets TCP de forma nativa con /dev/tcp, sin binarios extra. Comprueba que
    # Promtail acepta conexiones en su http_listen_port (9080 en promtail-config.yaml).
    # Limitacion honesta: valida el socket, no la logica interna. Para el fallo mas comun de un
    # agente de logs -- proceso vivo pero sin escuchar -- alcanza. Un /ready real requeriria
    # anadir un cliente HTTP a la imagen, que es peor negocio que este chequeo.
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/9080' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    image: grafana/promtail:2.9.4
    container_name: promtail
    restart: unless-stopped
    volumes:
      # Necesita leer el socket de Docker para descubrir qué contenedores existen,
      # y la carpeta donde Docker guarda los logs (driver json-file, el default).
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yaml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

# --- Definición de Volúmenes ---
volumes:
  postgres_data_notificaciones:
  postgres_data_auth:
  postgres_data_usuarios:
  postgres_data_agenda:
  postgres_data_tutorias:
  rabbitmq_data:
  tempo_data:
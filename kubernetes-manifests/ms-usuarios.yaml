# kubernetes-manifests/ms-usuarios.yaml
#
# Equipo 5 (Deployment) — issue "K8s operable": probes, resources y variables de BD y broker
# sincronizadas con docker-compose.yml (drift corregido: este manifiesto no tenía DB_* ni
# RABBITMQ_URL). Probes sobre /metrics (express-prom-bundle); /health con dependencias es el
# siguiente paso, coordinado con el Equipo 4.
apiVersion: v1
kind: Service
metadata:
  name: ms-usuarios-service # Nombre del servicio, será el DNS interno
spec:
  selector:
    app: ms-usuarios # Selecciona los Pods con esta etiqueta
  ports:
    - protocol: TCP
      port: 3001 # Puerto por el que el servicio es accesible
      targetPort: 3001 # Puerto en el contenedor
  type: ClusterIP # Solo accesible DENTRO del clúster
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-usuarios-deployment
spec:
  replicas: 1 # Queremos una sola instancia de este servicio
  selector:
    matchLabels:
      app: ms-usuarios
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
      labels:
        app: ms-usuarios # Etiqueta que el Service usa para encontrar este Pod
    spec:
      containers:
        - name: ms-usuarios
          image: edsaana/ms-usuarios:1.1 # La imagen que publicaste
          ports:
            - containerPort: 3001
          # --- Equipo 5: chequeos de salud ---
          readinessProbe:
            httpGet:
              path: /metrics
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /metrics
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          # --- Equipo 5: garantías de capacidad (base para HPA futuro) ---
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          env:
            - name: PORT
              value: "3001"
            - name: SERVICE_NAME
              value: "MS_Usuarios"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-jwt-secret
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              value: "1h"
            # --- Equipo 5: BD y broker sincronizados con el compose. Los Services
            # db-usuarios-service y rabbitmq-service se crean en el issue 3; los valores
            # sensibles vienen del Secret app-runtime-secrets (no versionado). ---
            - name: DB_HOST
              value: "db-usuarios-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "user_usuarios"
            - name: DB_NAME
              value: "db_usuarios"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-runtime-secrets
                  key: USUARIOS_DB_PASSWORD
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: app-runtime-secrets
                  key: RABBITMQ_URL

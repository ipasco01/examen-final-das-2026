# kubernetes-manifests/db-usuarios.yaml
#
# Equipo 5 (Deployment) — issue "Datos y broker dentro del despliegue". Ver el comentario
# completo del patrón en db-auth.yaml: StatefulSet + volumen persistente + contraseña desde el
# Secret app-runtime-secrets (no versionado).
# --- Equipo 5 (20/07), hallazgo #17: el esquema no existia en Kubernetes ---
#
# En compose el esquema entra por ./docker/init/usuarios/01-schema.sql montado en
# /docker-entrypoint-initdb.d/. En Kubernetes eso NO tenia equivalente: el StatefulSet creaba el
# volumen y nadie corria el SQL nunca. Las bases quedaban vacias y ms-tutorias moria en loop con
# `relation "tutorias_notificaciones_outbox" does not exist`.
#
# Es el hallazgo #6 a medias: ahi el esquema vivia solo como texto en un .md y lo hice ejecutable
# para compose, pero nunca lo porte al otro entorno. La correccion arreglaba un entorno y dejaba el
# otro roto, que es justo lo que este PR viene senalando en el trabajo de los demas.
#
# IMPORTANTE: postgres ejecuta /docker-entrypoint-initdb.d/ SOLO cuando el directorio de datos esta
# vacio. Sobre un PVC ya inicializado esto no corre. Para aplicarlo a una base existente:
#   kubectl exec -i db-usuarios-0 -- psql -U user_usuarios -d db_usuarios < docker/init/usuarios/01-schema.sql
#
# El contenido es copia literal del archivo de la raiz. Mantenerlo sincronizado a mano es deuda:
# lo correcto seria generar el ConfigMap en un paso de build (kubectl create configmap --from-file).
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-usuarios-init
data:
  01-schema.sql: |
    -- docker/init/usuarios/01-schema.sql — base db_usuarios (ms-usuarios)
    -- Equipo 5 (Deployment). Se ejecuta solo en la primera inicialización del volumen.
    -- Ver docker/init/auth/01-schema.sql para el razonamiento completo.

    CREATE TABLE IF NOT EXISTS estudiantes (
        id VARCHAR(50) PRIMARY KEY,
        nombreCompleto VARCHAR(255) NOT NULL,
        email VARCHAR(255) UNIQUE NOT NULL,
        carrera VARCHAR(255)
    );

    CREATE TABLE IF NOT EXISTS tutores (
        id VARCHAR(50) PRIMARY KEY,
        nombreCompleto VARCHAR(255) NOT NULL,
        email VARCHAR(255) UNIQUE NOT NULL
    );

    -- Deuda #14 resuelta: 'especialidad' era un VARCHAR libre en 'tutores' (un tutor = una sola
    -- materia, sin catálogo, sin poder ofrecer un <select> en el cliente). Se reemplaza por un
    -- catálogo real + relación N:M, para que un tutor pueda dictar más de una materia y "materia"
    -- deje de ser texto libre sin validar.
    CREATE TABLE IF NOT EXISTS materias (
        id SERIAL PRIMARY KEY,
        nombre VARCHAR(255) UNIQUE NOT NULL
    );

    CREATE TABLE IF NOT EXISTS tutor_materia (
        idTutor VARCHAR(50) NOT NULL REFERENCES tutores(id),
        idMateria INTEGER NOT NULL REFERENCES materias(id),
        PRIMARY KEY (idTutor, idMateria)
    );

    -- Datos de demostración. 'e12345' y 't09876' coinciden con los usuarios de db_auth: la Saga
    -- resuelve el perfil contra este servicio usando el id que viene en el JWT emitido por ms-auth.
    INSERT INTO estudiantes (id, nombreCompleto, email, carrera) VALUES
    ('e12345', 'Ana Torres', 'ana.torres@universidad.edu', 'Ingeniería de Software'),
    ('e67890', 'Luis Garcia', 'luis.garcia@universidad.edu', 'Medicina')
    ON CONFLICT (id) DO NOTHING;

    INSERT INTO tutores (id, nombreCompleto, email) VALUES
    ('t54321', 'Dr. Carlos Rojas', 'carlos.rojas@universidad.edu'),
    ('t09876', 'Dra. Elena Solano', 'elena.solano@universidad.edu')
    ON CONFLICT (id) DO NOTHING;

    -- t54321 dicta dos materias a propósito: es la prueba de que la relación N:M funciona, no solo
    -- una migración 1:1 del VARCHAR viejo.
    INSERT INTO materias (nombre) VALUES
    ('Bases de Datos Avanzadas'),
    ('Estructuras de Datos'),
    ('Cálculo Multivariable')
    ON CONFLICT (nombre) DO NOTHING;

    INSERT INTO tutor_materia (idTutor, idMateria)
    SELECT 't54321', id FROM materias WHERE nombre = 'Bases de Datos Avanzadas'
    ON CONFLICT DO NOTHING;
    INSERT INTO tutor_materia (idTutor, idMateria)
    SELECT 't54321', id FROM materias WHERE nombre = 'Estructuras de Datos'
    ON CONFLICT DO NOTHING;
    INSERT INTO tutor_materia (idTutor, idMateria)
    SELECT 't09876', id FROM materias WHERE nombre = 'Cálculo Multivariable'
    ON CONFLICT DO NOTHING;

---
apiVersion: v1
kind: Service
metadata:
  name: db-usuarios-service # DNS interno; coincide con DB_HOST en ms-usuarios.yaml
spec:
  selector:
    app: db-usuarios
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-usuarios
spec:
  serviceName: db-usuarios-service
  replicas: 1
  selector:
    matchLabels:
      app: db-usuarios
  template:
    metadata:
      labels:
        app: db-usuarios
    spec:
      containers:
        - name: postgres
          image: postgres:14-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              # Equipo 5 (20/07). `drop: ["ALL"]` a secas rompia este StatefulSet, y el fallo
              # estuvo latente un dia entero: el endurecimiento se commiteo el 19/07 15:04 pero
              # el cluster no se volvio a aplicar hasta hoy, asi que los pods que se veian
              # Running eran de ANTES del cambio. Escrito, revisado y documentado como hecho --
              # nunca ejecutado. Es el hallazgo #7 (el CrashLoopBackOff del Equipo 2) repetido,
              # esta vez sobre mi propio trabajo.
              #
              # El entrypoint de postgres arranca como root para preparar el directorio de datos
              # (chown/chmod sobre el volumen montado) y recien despues baja a usuario postgres.
              # Sin estas capabilities el chmod falla con "Operation not permitted" y el
              # contenedor muere en loop. Se devuelve el minimo necesario, no se afloja el drop:
              #   CHOWN + FOWNER    -> ajustar dueño y permisos de /var/lib/postgresql/data
              #   DAC_OVERRIDE      -> leer/escribir archivos del volumen creados por otro uid
              #   SETUID + SETGID   -> el su-exec que cambia de root a postgres
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID"]

          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "user_usuarios"
            - name: POSTGRES_DB
              value: "db_usuarios"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-runtime-secrets
                  key: USUARIOS_DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "user_usuarios", "-d", "db_usuarios"]
            initialDelaySeconds: 10
            periodSeconds: 10
            # Equipo 5 (20/07): timeoutSeconds EXPLICITO. Faltaba, y el default de Kubernetes
            # es 1 segundo -- el hallazgo #4 documentado para rabbitmq, que quedo sin aplicar aca.
            # Bajo carga, pg_isready tarda mas de 1s y el evento fue real:
            #   Liveness probe failed: command timed out: "pg_isready ..." timed out after 1s
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "user_usuarios", "-d", "db_usuarios"]
            initialDelaySeconds: 30
            periodSeconds: 15
            # Equipo 5 (20/07): timeoutSeconds EXPLICITO. Faltaba, y el default de Kubernetes
            # es 1 segundo -- el hallazgo #4 documentado para rabbitmq, que quedo sin aplicar aca.
            # Bajo carga, pg_isready tarda mas de 1s y el evento fue real:
            #   Liveness probe failed: command timed out: "pg_isready ..." timed out after 1s
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            # Solo lectura: el contenedor no debe poder modificar el esquema.
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: db-usuarios-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: init
          configMap:
            name: db-usuarios-init
  volumeClaimTemplates:
    - metadata:
        name: db-usuarios-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

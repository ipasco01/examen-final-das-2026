# .github/workflows/deployment-checks.yml
#
# Equipo 5 (Deployment) — D6 de la auditoría.
#
# Por qué existe, con evidencia y no por buenas intenciones. Tres veces en 48 horas entró a la
# rama principal algo que este workflow habría bloqueado:
#
#   18/07 — tempo y otel-collector entraron sin `restart` y con `:latest`, reintroduciendo dos
#           deudas que este mismo PR ya había cerrado.
#   19/07 — ms-tutorias quedó en CrashLoopBackOff: el export de publishTrackingEvent apuntaba a
#           una función comentada. El PR se revisó y se aprobó; nadie ejecutó el código.
#   19/07 — las 4 bases no tenían script de inicialización: el esquema solo existía como texto
#           para copiar y pegar de un .md, así que el sistema no se podía levantar desde cero.
#
# Ninguno se detecta leyendo un diff. Los tres aparecen al ejecutar. Este workflow ejecuta.

name: Deployment checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  compose-lint:
    name: Politica de despliegue (compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: docker compose config es valido
        # Valida sintaxis e interpolación sin levantar nada. Las variables se rellenan con el
        # .env.example para que las guardas ${VAR:?} no aborten el chequeo.
        run: |
          cp .env.example .env
          docker compose config > /dev/null

      - name: Ninguna imagen usa :latest ni queda sin fijar
        # Una tag flotante hace que dos personas con el mismo commit corran binarios distintos.
        #
        # CORRECCION DEL 20/07 -- este chequeo tenia un agujero y paso en verde durante dias.
        # La version anterior era `docker compose config | grep "image:.*:latest"`. El problema:
        # un servicio que solo declara `build:` y NO `image:` no produce ninguna linea `image:`
        # en la salida de `docker compose config` (verificado en la maquina de desarrollo). Docker
        # igual le genera un nombre al construir -- "<proyecto>-<servicio>:latest" -- asi que el
        # servicio corria con tag flotante mientras el lint no encontraba nada que reportar.
        #
        # Asi estaban client-sim y tracking-dashboard. Se descubrio leyendo la salida de un
        # `docker compose build` ("naming to ...-client-sim:latest"), no por este chequeo.
        #
        # La leccion: un grep solo puede fallar sobre lo que esta escrito. El caso peligroso era
        # justamente la AUSENCIA de una clave, que ningun patron de texto puede detectar. Por eso
        # ahora se parsea el YAML, igual que el chequeo de `restart` de abajo -- que nunca tuvo
        # este problema precisamente porque pregunta por la ausencia, no por el contenido.
        run: |
          python3 - <<'EOF'
          import yaml, sys
          servicios = yaml.safe_load(open('docker-compose.yml'))['services']
          errores = []
          for nombre, cfg in servicios.items():
              imagen = cfg.get('image')
              if imagen is None:
                  errores.append(f"{nombre}: no declara 'image' -- Docker le asignara ':latest' al construir")
              elif str(imagen).endswith(':latest'):
                  errores.append(f"{nombre}: usa ':latest' explicitamente")
              elif ':' not in str(imagen).rsplit('/', 1)[-1]:
                  errores.append(f"{nombre}: la imagen '{imagen}' no tiene tag (Docker asume ':latest')")
          if errores:
              for e in errores:
                  print(f"::error::{e}")
              sys.exit(1)
          print(f"OK: las {len(servicios)} imagenes estan fijadas por version o digest")
          EOF

      - name: Todo servicio declara restart
        # Sin politica de reinicio, un proceso que muere deja el contenedor caido en silencio.
        run: |
          python3 - <<'EOF'
          import yaml, sys
          servicios = yaml.safe_load(open('docker-compose.yml'))['services']
          faltan = [n for n, s in servicios.items() if 'restart' not in s]
          if faltan:
              print(f"::error::Servicios sin 'restart': {', '.join(faltan)}")
              sys.exit(1)
          print(f"OK: {len(servicios)} servicios, todos con restart")
          EOF

      - name: Todo servicio declara healthcheck
        # AGREGADO EL 20/07, y con motivo concreto: el merge del Equipo 4 incorporo `alertmanager`
        # y `mailpit` SIN healthcheck, y ningun job dijo nada. D1 es el issue fundacional de esta
        # zona -- "un proceso vivo pero sin responder figura como Up y compose lo da por bueno" --
        # y era justamente la unica regla de la politica que el pipeline no verificaba.
        #
        # Es el mismo hueco que tenia el chequeo de :latest: un control que parece cubrir la
        # politica y deja pasar lo que mas importa. La diferencia es que este se detecto mirando
        # trabajo entrante, antes de que causara dañio.
        #
        # EXCEPCION UNICA Y COMPROBADA: otel-collector. La imagen no tiene shell y sus 4
        # subcomandos (`validate`, `components`, `help`, `completion`) son offline: ninguno
        # consulta al collector corriendo. Verificado con tres `docker exec`, documentado en la
        # seccion 3 de docs/deployment-release-checklist.md. La lista es explicita a proposito:
        # agregar un servicio aca obliga a justificarlo por escrito, que es el punto.
        run: |
          python3 - <<'EOF'
          import yaml, sys
          SIN_HEALTHCHECK_JUSTIFICADO = {
              'otel-collector': 'imagen sin shell; los subcomandos de /otelcol-contrib son offline',
          }
          servicios = yaml.safe_load(open('docker-compose.yml'))['services']
          faltan = [n for n, s in servicios.items()
                    if 'healthcheck' not in s and n not in SIN_HEALTHCHECK_JUSTIFICADO]
          if faltan:
              for n in faltan:
                  print(f"::error::{n}: sin healthcheck. Un contenedor 'Up' no es un servicio sano. "
                        f"Si de verdad no se puede, agregalo a SIN_HEALTHCHECK_JUSTIFICADO con el motivo.")
              sys.exit(1)
          exentos = len(SIN_HEALTHCHECK_JUSTIFICADO)
          print(f"OK: {len(servicios) - exentos} de {len(servicios)} con healthcheck "
                f"({exentos} exento documentado)")
          EOF

      - name: Ningun secreto real versionado
        # Se busca lo contrario de lo intuitivo: un placeholder es SANO (significa que el valor
        # real no esta en el repo). Lo que se bloquea es que aparezca un placeholder NUEVO en un
        # manifiesto que no este en la lista de excepciones conocidas -- porque eso indica que
        # alguien versiono un secreto a medias en vez de inyectarlo en el cluster.
        #
        # Excepcion conocida y aceptada: kong-security.yaml (Equipo 3) trae
        # CHANGE_ME_WITH_APP_JWT_SECRET a proposito. Se reemplaza en el cluster despues del apply
        # masivo, ver seccion 4 de docs/deployment-release-checklist.md. Esta anotado como deuda
        # en docs/api-security-controls.md: el secreto deberia gestionarse fuera del repo.
        run: |
          hallazgos=$(grep -rln "CHANGE_ME\|COMPLETAR" kubernetes-manifests/*.yaml \
                      | grep -v "kong-security.yaml" || true)
          if [ -n "$hallazgos" ]; then
            echo "::error::Placeholders de secreto fuera de la lista de excepciones: $hallazgos"
            exit 1
          fi
          echo "OK: solo la excepcion documentada (kong-security.yaml)"

      - name: Ningun secreto REAL con valor en el repo
        # El chequeo que de verdad importa: que no se cuele un .env o el Secret real de runtime.
        run: |
          if git ls-files | grep -E "(^|/)\.env$|app-runtime-secrets\.yaml$"; then
            echo "::error::Hay un archivo de secretos versionado."
            exit 1
          fi
          echo "OK: ningun archivo de secretos trackeado"

  k8s-lint:
    name: Politica de despliegue (Kubernetes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Manifiestos parsean y cumplen la politica minima
        # Chequeo ESTRUCTURAL: rapido (7s) y suficiente para lo que se olvida al escribir un
        # manifiesto. Pero NO dice nada sobre si los pods arrancan -- ver el job k8s-arranque-real
        # de abajo, agregado el 20/07 despues de que este chequeo pasara en verde durante un dia
        # entero mientras las 5 bases y RabbitMQ estaban rotas en el cluster (hallazgo #16).
        run: |
          python3 - <<'EOF'
          import yaml, glob, sys
          errores = []
          for f in glob.glob('kubernetes-manifests/*.yaml'):
              for doc in yaml.safe_load_all(open(f)):
                  if not doc or doc.get('kind') not in ('Deployment', 'StatefulSet'):
                      continue
                  nombre = doc['metadata']['name']
                  for c in doc['spec']['template']['spec']['containers']:
                      if str(c.get('image', '')).endswith(':latest'):
                          errores.append(f"{nombre}: imagen con :latest")
                      for campo in ('readinessProbe', 'livenessProbe', 'resources'):
                          if campo not in c:
                              errores.append(f"{nombre}: falta {campo}")
          if errores:
              for e in errores:
                  print(f"::error::{e}")
              sys.exit(1)
          print("OK: todos los workloads tienen probes, resources y version fijada")
          EOF

  k8s-arranque-real:
    name: Los manifiestos levantan en un cluster de verdad
    runs-on: ubuntu-latest
    # DEUDA #15, CERRADA EL 20/07. Es el equivalente del job `arranque-real` (que valida compose)
    # pero del lado de Kubernetes, y existe por un caso concreto:
    #
    #   El 19/07 a las 15:04 se commiteo `securityContext: capabilities: drop: ["ALL"]` en los 5
    #   StatefulSets de Postgres y en RabbitMQ. Eso le quita CHOWN/SETGID al entrypoint, que
    #   arranca como root para preparar el volumen. **Rompia las 6 cosas con estado.**
    #
    #   Estuvo un dia entero sin que nadie lo viera, porque nadie volvio a aplicar los manifiestos
    #   y el job `k8s-lint` valida estructura, no arranque: probes, resources y version estaban
    #   perfectos. En verde, y roto.
    #
    # Es el hallazgo #7 (el CrashLoopBackOff del Equipo 2, aprobado y mergeado sin ejecutar) sobre
    # nuestro propio trabajo. La leccion se repite: **un manifiesto valido no es un manifiesto que
    # funciona.**
    #
    # Se usa kind (Kubernetes in Docker): levanta un cluster real en el runner en ~40s. No sirve
    # para validar el Ingress de Kong (sus CRDs no estan instalados) ni el HPA (no hay
    # metrics-server), y esos quedan fuera a proposito: ver el paso de despliegue.
    steps:
      - uses: actions/checkout@v4

      - name: Crear cluster efimero
        uses: helm/kind-action@v1
        with:
          cluster_name: ci

      - name: Construir las imagenes y cargarlas en el cluster
        # kind tiene su propio almacen de imagenes, aislado del daemon de Docker del runner. Sin
        # `kind load`, los pods quedarian en ImagePullBackOff intentando bajar de GHCR una tag que
        # todavia no se publico. Es la misma diferencia que en local entre el Kubernetes de Docker
        # Desktop (comparte el daemon, por eso alli funciona `imagePullPolicy: IfNotPresent`) y kind.
        run: |
          for ms in ms-auth ms-usuarios ms-agenda ms-notificaciones ms-tutorias; do
            docker build -t "ghcr.io/elcbas/$ms:0ab70dc" "./$ms"
            kind load docker-image "ghcr.io/elcbas/$ms:0ab70dc" --name ci
          done

      - name: Crear los Secrets que no se versionan
        # En el cluster real estos valores los inyecta el operador (ver seccion 4 del checklist).
        # Aca se generan al vuelo: lo que se valida es que los manifiestos ARRANQUEN, no el manejo
        # de secretos, que ya cubre el job compose-lint.
        run: |
          kubectl create secret generic app-runtime-secrets \
            --from-literal=AUTH_DB_PASSWORD=ci-auth \
            --from-literal=USUARIOS_DB_PASSWORD=ci-usuarios \
            --from-literal=AGENDA_DB_PASSWORD=ci-agenda \
            --from-literal=TUTORIAS_DB_PASSWORD=ci-tutorias \
            --from-literal=NOTIFICACIONES_DB_PASSWORD=ci-notificaciones \
            --from-literal=RABBITMQ_DEFAULT_USER=ci-broker \
            --from-literal=RABBITMQ_DEFAULT_PASS=ci-broker-pass \
            --from-literal=RABBITMQ_URL=amqp://ci-broker:ci-broker-pass@rabbitmq-service:5672
          kubectl create secret generic app-jwt-secret --from-literal=JWT_SECRET=ci-jwt-secret

      - name: Desplegar
        # Se excluyen dos archivos, y el motivo esta documentado en el checklist:
        #   kong-security.yaml -> usa CRDs de Kong (KongPlugin/KongConsumer) que no estan instalados
        #   autoscaling.yaml   -> los HPA necesitan metrics-server, que kind no trae
        # Ninguno de los dos impide que los pods arranquen, que es lo que este job verifica.
        run: |
          mkdir -p /tmp/manifiestos
          cp kubernetes-manifests/*.yaml /tmp/manifiestos/
          rm -f /tmp/manifiestos/kong-security.yaml /tmp/manifiestos/autoscaling.yaml
          kubectl apply -f /tmp/manifiestos/

      - name: Los pods con estado llegan a Ready
        # ESTE es el paso que habria atrapado el hallazgo #16. Un StatefulSet cuyo entrypoint no
        # puede preparar su volumen entra en CrashLoopBackOff y nunca llega a Ready.
        run: |
          kubectl rollout status statefulset/db-auth --timeout=180s
          kubectl rollout status statefulset/db-usuarios --timeout=180s
          kubectl rollout status statefulset/db-agenda --timeout=180s
          kubectl rollout status statefulset/db-tutorias --timeout=180s
          kubectl rollout status statefulset/db-notificaciones --timeout=180s
          kubectl rollout status statefulset/rabbitmq --timeout=180s
          kubectl rollout status statefulset/tempo --timeout=180s

      - name: El esquema de BD se creo solo
        # ESTE es el paso que habria atrapado el hallazgo #17. En compose el esquema entra por
        # /docker-entrypoint-initdb.d; en K8s eso no existia y las bases nacian vacias, con lo cual
        # ms-tutorias moria en loop buscando `tutorias_notificaciones_outbox`.
        # Se verifica el EFECTO (la tabla existe), no que el ConfigMap este montado.
        run: |
          kubectl exec db-tutorias-0 -- psql -U user_tutorias -d db_tutorias \
            -c "SELECT 1 FROM tutorias_notificaciones_outbox LIMIT 1;" > /dev/null
          kubectl exec db-notificaciones-0 -- psql -U user_notificaciones -d db_notificaciones \
            -c "SELECT 1 FROM logs_notificacion LIMIT 1;" > /dev/null
          echo "OK: el esquema se inicializo solo en las dos bases criticas"

      - name: Los microservicios llegan a Ready
        run: |
          for ms in ms-auth ms-usuarios ms-agenda ms-notificaciones ms-tutorias; do
            kubectl rollout status "deployment/${ms}-deployment" --timeout=180s
          done

      - name: El pipeline de trazas esta arriba
        run: |
          kubectl rollout status deployment/otel-collector --timeout=120s
          echo "OK: collector y Tempo Ready"

      - name: Diagnostico si algo fallo
        if: failure()
        run: |
          kubectl get pods -o wide
          kubectl get events --sort-by=.lastTimestamp | tail -40
          kubectl describe pods | grep -A5 -E "Warning|Error" || true
          for p in $(kubectl get pods -o name); do
            echo "===== $p ====="
            kubectl logs "$p" --tail=30 --all-containers=true || true
          done

  arranque-real:
    name: El stack levanta y responde
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Levantar bases, broker y microservicios
        # Este es el chequeo que habria evitado el CrashLoopBackOff del 19/07: construye las
        # imagenes desde el codigo del PR y las ejecuta de verdad.
        run: |
          cp .env.example .env
          docker compose up -d --build \
            db-auth db-usuarios db-agenda db-tutorias rabbitmq \
            ms-auth ms-usuarios ms-agenda ms-notificaciones ms-tutorias

      - name: Cada microservicio responde /metrics
        run: |
          sleep 45
          fallos=0
          for p in 4000 3001 3002 3003 3000; do
            if curl -fsS -m 10 "http://localhost:$p/metrics" > /dev/null; then
              echo "puerto $p OK"
            else
              echo "::error::el servicio en el puerto $p no responde /metrics"
              fallos=1
            fi
          done
          exit $fallos

      - name: El flujo de negocio funciona, no solo el arranque
        # DEUDA #11, CERRADA EL 20/07.
        #
        # Todo lo de arriba pregunta "¿el proceso responde?". Esto pregunta "¿el sistema hace lo
        # que dice hacer?". La diferencia no es teorica: los hallazgos #10 y #11 pasaron los
        # chequeos de arranque con verde y estaban rotos.
        #
        #   #10 — ms-notificaciones necesitaba una base que no existia. Arranca sano; falla en la
        #         primera notificacion que intenta deduplicar.
        #   #11 — ms-notificaciones sin JWT_SECRET. Arranca sano; rechaza todo token valido.
        #
        # El script ejercita login -> catalogo -> solicitar -> CONFIRMADA, y despues verifica dos
        # EFECTOS que solo existen si la cadena completa funciono: la fila en logs_notificacion
        # (atrapa #10) y que el endpoint protegido acepte el token (atrapa #11).
        #
        # "Un contenedor Up no es un servicio sano" fue la leccion de D1. Esto es el paso
        # siguiente: un servicio sano no es todavia un sistema que funciona.
        run: |
          chmod +x scripts/integracion-flujo-completo.sh
          ./scripts/integracion-flujo-completo.sh

      - name: Diagnostico si algo fallo
        if: failure()
        run: docker compose ps && docker compose logs --tail 50

      - name: Limpieza
        if: always()
        run: docker compose down -v

# kubernetes-manifests/db-notificaciones.yaml
#
# Equipo 5 (19/07). Base AGREGADA tras detectar que ms-notificaciones incorporo
# src/config/db.js y logNotificacion.repository.js -- que escriben en 'logs_notificacion' en
# cada notificacion para deduplicar por correlation_id -- sin que existiera ninguna base para
# ese servicio, ni en compose ni aqui. Mismo patron que StatefulSet de las otras cuatro:
# identidad de red estable y volumen propio, porque el log de envios NO puede perderse en un
# reinicio: si se pierde, se re-envian correos ya enviados.
#
# Equipo 5 (Deployment) — issue "Datos y broker dentro del despliegue": antes de este cambio,
# Kubernetes solo tenía los microservicios; las bases de datos vivían únicamente en Docker
# Compose, así que ningún pod podía llegar a Ready. StatefulSet (no Deployment) porque una base
# de datos guarda estado: necesita identidad estable y almacenamiento que sobreviva reinicios
# (volumeClaimTemplates). La contraseña viene del Secret app-runtime-secrets, que NO se versiona
# (ver app-runtime-secrets.example.yaml).
apiVersion: v1
kind: Service
metadata:
  name: db-notificaciones-service # DNS interno; coincide con DB_HOST en ms-auth.yaml
spec:
  selector:
    app: db-notificaciones
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-notificaciones
spec:
  serviceName: db-notificaciones-service
  replicas: 1
  selector:
    matchLabels:
      app: db-notificaciones
  template:
    metadata:
      labels:
        app: db-notificaciones
    spec:
      containers:
        - name: postgres
          image: postgres:14-alpine # Misma versión fijada que en docker-compose.yml
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "user_notificaciones"
            - name: POSTGRES_DB
              value: "db_notificaciones"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-runtime-secrets
                  key: NOTIFICACIONES_DB_PASSWORD
            # Subdirectorio para los datos: evita el conflicto de Postgres con la carpeta
            # lost+found que algunos provisionadores crean en la raíz del volumen.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "user_notificaciones", "-d", "db_notificaciones"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "user_notificaciones", "-d", "db_notificaciones"]
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: db-notificaciones-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: db-notificaciones-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

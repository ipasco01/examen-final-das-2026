# kubernetes-manifests/ms-usuarios.yaml
#
# Equipo 5 (Deployment) — issue "K8s operable": probes, resources y variables de BD y broker
# sincronizadas con docker-compose.yml (drift corregido: este manifiesto no tenía DB_* ni
# RABBITMQ_URL). Probes sobre /metrics (express-prom-bundle); /health con dependencias es el
# siguiente paso, coordinado con el Equipo 4.
apiVersion: v1
kind: Service
metadata:
  name: ms-usuarios-service # Nombre del servicio, será el DNS interno
spec:
  selector:
    app: ms-usuarios # Selecciona los Pods con esta etiqueta
  ports:
    - protocol: TCP
      port: 3001 # Puerto por el que el servicio es accesible
      targetPort: 3001 # Puerto en el contenedor
  type: ClusterIP # Solo accesible DENTRO del clúster
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-usuarios-deployment
spec:
  replicas: 1 # Queremos una sola instancia de este servicio
  selector:
    matchLabels:
      app: ms-usuarios
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
      labels:
        app: ms-usuarios # Etiqueta que el Service usa para encontrar este Pod
        # Equipo 5 (20/07): etiqueta para que Prometheus recupere el label `service_name`.
        # En compose ese label lo pone el Equipo 4 target por target en prometheus.yml
        # (static_configs). En Kubernetes los targets se descubren solos y no hay donde
        # escribirlos a mano, asi que el dato tiene que viajar CON el pod: Prometheus lo lee
        # con relabel_configs desde __meta_kubernetes_pod_label_service_name.
        # Sin esto el panel "Servicios activos (up)" de Isabel muestra "No data" aunque los 5
        # esten sanos -- el mismo bug que ella arreglo en compose, reintroducido al cambiar de
        # plataforma.
        service_name: MS_Usuarios
    spec:
      # Equipo 5 (D4 de la auditoria, mitad Kubernetes): el USER del Dockerfile es una
      # preferencia de la imagen; securityContext es la garantia del cluster. Sin runAsNonRoot,
      # una imagen que por descuido vuelva a root corre como root y nadie se entera.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000          # usuario 'node', ya existe en node:*-alpine
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: ms-usuarios
          image: ghcr.io/elcbas/ms-usuarios:0ab70dc # Equipo 5: imagen construida desde ESTE repo (commit 0ab70dc)
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]     # la app solo abre un puerto > 1024: no necesita ninguna capability

          ports:
            - containerPort: 3001
          # --- Equipo 5: chequeos de salud ---
          # Equipo 5 (20/07): las probes apuntaban a /metrics y eso fallaba por DOS causas
          # independientes -- el rate limiter devolvia 429 tras ~10 min (hallazgo #19) y los Gauges
          # del Equipo 4 consultan la BD, asi que un fallo de datos derribaba el pod (hallazgo #17).
          # Ahora apuntan a /health, que se registra ANTES del rateLimit y no toca la base.
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          # --- Equipo 5: garantías de capacidad (base para HPA futuro) ---
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          env:
            - name: PORT
              value: "3001"
            - name: SERVICE_NAME
              value: "MS_Usuarios"
            # --- Equipo 5 (20/07), deuda #12: OpenTelemetry ---
            # Faltaban en los 5 Deployments. `tracing.js` cae a `http://otel-collector:4317` cuando
            # no estan, y hasta hoy ese nombre no resolvia en el cluster: el exportador reintentaba
            # en silencio y no habia una sola traza. Ahora el collector existe (otel-collector.yaml)
            # y ademas se declara explicito: depender de un default que coincide por casualidad es
            # la misma clase de omision que costo los hallazgos #1 y #10.
            - name: OTEL_SERVICE_NAME
              value: "ms-usuarios"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-jwt-secret
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              value: "1h"
            # --- Equipo 5: BD y broker sincronizados con el compose. Los Services
            # db-usuarios-service y rabbitmq-service se crean en el issue 3; los valores
            # sensibles vienen del Secret app-runtime-secrets (no versionado). ---
            - name: DB_HOST
              value: "db-usuarios-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "user_usuarios"
            - name: DB_NAME
              value: "db_usuarios"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-runtime-secrets
                  key: USUARIOS_DB_PASSWORD
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: app-runtime-secrets
                  key: RABBITMQ_URL

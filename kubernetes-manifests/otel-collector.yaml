# kubernetes-manifests/otel-collector.yaml
#
# Equipo 5 (Deployment) — deuda #12: el eslabon que faltaba entre los microservicios y Tempo.
#
# EL SERVICE SE LLAMA `otel-collector` a proposito, igual que en compose. `tracing.js` de los 5
# microservicios cae a `http://otel-collector:4317` cuando no hay variable, asi que con este nombre
# el DNS del cluster resuelve exactamente igual que el de compose. Aun asi, en los Deployments la
# variable se declara EXPLICITAMENTE (ver ms-*.yaml): depender de un default que casualmente
# coincide es como no declarar `restart` y confiar en que nadie reinicie el host.
#
# Deployment y no StatefulSet: el collector no guarda nada. Los spans entran, se procesan en el
# batch processor y salen a Tempo. Si el pod muere se pierde a lo sumo un batch de 5s, que es una
# perdida aceptable para telemetria -- distinto de una base, donde perder un batch es perder datos
# del negocio.
#
# SOBRE LA PROBE: `httpGet` al 13133 (actualizado el 20/07).
# Nacio como `tcpSocket: 4317` porque la extension `health_check` no estaba activada. Ya lo esta
# --se agrego a otel-collector-config.yaml el mismo dia-- y `httpGet` es estrictamente mejor: el
# socket solo confirmaba que el puerto acepta conexiones, esto confirma que el collector se declara
# operativo. Verificado:  curl http://localhost:13133 -> {"status":"Server available",...}
#
# Lo importante del caso: en compose este servicio NO PUEDE tener healthcheck (imagen sin shell,
# subcomandos de /otelcol-contrib todos offline -- comprobado con tres `docker exec`). En K8s si,
# porque la probe la ejecuta el kubelet desde afuera. **El mismo servicio, la misma imagen, y una
# plataforma puede verificarlo y la otra no.** Es la tesis de esta zona en su forma mas limpia.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  # Contenido IDENTICO a ./otel-collector-config.yaml de la raiz. Archivo del Equipo 4: define su
  # pipeline de observabilidad y no se toca desde aca, solo se transporta.
  otel-collector-config.yaml: |
    # Equipo 5 (20/07) agrego el bloque `extensions` de abajo. Es aditivo: no toca receivers,
    # processors ni exporters, o sea que el pipeline de trazas del Equipo 4 queda igual.

    extensions:
      # Expone un endpoint HTTP que responde 200 si el collector esta operativo.
      #
      # PARA QUE SIRVE Y PARA QUE NO -- el matiz importa y costo tres `docker exec` averiguarlo:
      #
      #   En KUBERNETES si sirve. Una probe `httpGet` la ejecuta el kubelet DESDE FUERA del
      #   contenedor, asi que no hace falta ningun binario adentro. Con esto la probe de
      #   kubernetes-manifests/otel-collector.yaml pasa de `tcpSocket` (que solo confirma que el
      #   puerto escucha) a `httpGet` al 13133, que confirma que el collector se declara sano.
      #
      #   En DOCKER COMPOSE no alcanza. El healthcheck de Docker corre DENTRO del contenedor, y esta
      #   imagen no tiene shell ni cliente HTTP: los cuatro subcomandos de /otelcol-contrib
      #   (validate, components, help, completion) son offline y ninguno consulta a un collector
      #   corriendo. Por eso `otel-collector` sigue siendo el unico servicio de compose sin
      #   healthcheck, y la unica excepcion documentada en el CI.
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 5s
        limit_mib: 400
        spike_limit_mib: 100
      batch:
        timeout: 5s
        send_batch_size: 512
      resource:
        attributes:
          - key: deployment.environment
            value: "development"
            action: upsert

    exporters:
      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true
      debug:
        verbosity: basic

    service:
      # Sin esta linea la extension queda definida pero NO se carga: declararla arriba no alcanza.
      # Es el mismo patron de todo este proyecto -- lo escrito no es lo que corre hasta que algo lo
      # activa. Verificable:  curl http://localhost:13133  ->  debe responder 200.
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [otlp/tempo, debug]
      telemetry:
        logs:
          level: info
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector # mismo nombre que en compose: el default de tracing.js resuelve igual
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      protocol: TCP
      port: 4317
      targetPort: 4317
    - name: otlp-http
      protocol: TCP
      port: 4318
      targetPort: 4318
    - name: health
      protocol: TCP
      port: 13133
      targetPort: 13133
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.108.0 # misma version que en compose
          args: ["--config=/etc/otel-collector-config.yaml"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: health
              containerPort: 13133
          # Actualizado el 20/07: era `tcpSocket: 4317` porque la extension `health_check` no
          # estaba activada. Ahora si lo esta, y `httpGet` al 13133 es estrictamente mejor: el
          # socket solo confirmaba que el puerto acepta conexiones; esto confirma que el collector
          # se declara operativo. La ejecuta el kubelet desde fuera del contenedor, por eso funciona
          # aunque la imagen no tenga shell -- lo que en compose sigue siendo imposible.
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          # `limit_mib: 400` del memory_limiter tiene que quedar POR DEBAJO del limite del
          # contenedor, o el kernel mata el proceso (OOMKill) antes de que el propio collector
          # pueda aplicar su politica de descarte. El memory_limiter existe justamente para
          # degradar de forma controlada en vez de morir de golpe.
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/otel-collector-config.yaml
              subPath: otel-collector-config.yaml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-collector-config

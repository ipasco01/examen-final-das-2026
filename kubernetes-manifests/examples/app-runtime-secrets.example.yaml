# kubernetes-manifests/app-runtime-secrets.example.yaml
#
# Equipo 5 (Deployment) — PLANTILLA, no se aplica tal cual.
#
# Mismo patrón que el .env.example de la raíz (política del Equipo 3: ningún secreto real
# versionado en git). Para desplegar:
#
#   1. Copiar este archivo a app-runtime-secrets.yaml (está en .gitignore, no se commitea).
#   2. Completar los valores reales (los mismos que usas en tu .env raíz).
#   3. kubectl apply -f kubernetes-manifests/app-runtime-secrets.yaml
#
# IMPORTANTE — son DOS Secrets, no uno. Orden de despliegue:
#
#   kubectl apply -f kubernetes-manifests/kong-security.yaml        # 1. app-jwt-secret (Equipo 3)
#   kubectl apply -f kubernetes-manifests/app-runtime-secrets.yaml  # 2. este archivo completado
#   kubectl apply -f kubernetes-manifests/                          # 3. el resto
#
# Los 5 microservicios leen JWT_SECRET del Secret 'app-jwt-secret', que NO esta en este archivo:
# lo declara kong-security.yaml (Equipo 3) y hoy trae el placeholder CHANGE_ME_WITH_APP_JWT_SECRET,
# que hay que reemplazar por el valor real ANTES de aplicar. Si se aplican los Deployments sin ese
# Secret, los 5 pods entran en CrashLoopBackOff con "FATAL ERROR: JWT_SECRET no esta definida"
# (fail-fast intencional de src/config/index.js), antes incluso de que corran las probes.
#
# Alternativa sin archivo:
#   kubectl create secret generic app-runtime-secrets \
#     --from-literal=AUTH_DB_PASSWORD=... \
#     --from-literal=USUARIOS_DB_PASSWORD=... \
#     --from-literal=AGENDA_DB_PASSWORD=... \
#     --from-literal=TUTORIAS_DB_PASSWORD=... \
#     --from-literal=RABBITMQ_URL=amqp://usuario:password@rabbitmq-service:5672
apiVersion: v1
kind: Secret
metadata:
  name: app-runtime-secrets
type: Opaque
stringData:
  AUTH_DB_PASSWORD: "COMPLETAR"
  USUARIOS_DB_PASSWORD: "COMPLETAR"
  AGENDA_DB_PASSWORD: "COMPLETAR"
  TUTORIAS_DB_PASSWORD: "COMPLETAR"
  NOTIFICACIONES_DB_PASSWORD: "COMPLETAR"
  # Credenciales del broker (las consume el StatefulSet de rabbitmq.yaml). El usuario y la
  # contraseña de RABBITMQ_URL deben coincidir con estos dos valores.
  RABBITMQ_DEFAULT_USER: "COMPLETAR"
  RABBITMQ_DEFAULT_PASS: "COMPLETAR"
  RABBITMQ_URL: "amqp://COMPLETAR_USUARIO:COMPLETAR_PASSWORD@rabbitmq-service:5672"

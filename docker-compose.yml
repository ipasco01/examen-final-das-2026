# docker-compose.yml
#
# Cambios del Equipo 5 (Deployment) — issue "Arranque ordenado y auto-recuperación":
#   - restart: unless-stopped en todos los servicios (auto-recuperación ante caídas).
#   - healthcheck en las 4 bases de datos y RabbitMQ.
#   - depends_on con condition: service_healthy para eliminar la carrera de arranque.
#   - Imágenes de Prometheus y Grafana fijadas a versión (reproducibilidad; eran :latest).
#   - Sincronización de variables (drift): ms-auth recibía cero variables de BD (su db.js caía a
#     localhost) y ms-usuarios/ms-agenda validan JWT en su middleware pero no recibían JWT_SECRET.

services:
  # --- Servicio de Autenticación ---
  ms-auth:
    # Equipo 5 (D1 de la auditoria): healthcheck propio. Antes estos servicios solo se
    # beneficiaban de la salud ajena (esperaban BD/broker sanos) pero nadie verificaba la suya:
    # un proceso vivo pero sin responder HTTP figuraba como 'Up' y compose lo daba por bueno.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:4000/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    build: ./ms-auth
    # Equipo 5: el build se etiqueta con la MISMA imagen que publicamos en GHCR y que
    # referencian los manifiestos de K8s. Asi compose, el push y el cluster corren el
    # mismo artefacto: se elimina el drift entre entornos. IMAGE_TAG = SHA corto del commit.
    image: ghcr.io/elcbas/ms-auth:${IMAGE_TAG:-0ab70dc}
    restart: unless-stopped
    ports:
      - "4000:4000" # Mapea el puerto 4000 de tu máquina al 4000 del contenedor
    environment:
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:?Definí JWT_SECRET en tu .env raíz}
      - JWT_EXPIRES_IN=1h
      - SERVICE_NAME=MS_Auth
      # --- VARIABLES PARA LA BD (Equipo 5: faltaban; db.js caía al default localhost) ---
      - DB_HOST=db-auth
      - DB_PORT=5432
      - DB_USER=user_auth
      - DB_PASSWORD=${AUTH_DB_PASSWORD:?Definí AUTH_DB_PASSWORD en tu .env raíz}
      - DB_NAME=db_auth
    depends_on:
      db-auth:
        condition: service_healthy

  # --- Servicio de Usuarios ---
  ms-usuarios:
    # Equipo 5 (D1 de la auditoria): healthcheck propio. Antes estos servicios solo se
    # beneficiaban de la salud ajena (esperaban BD/broker sanos) pero nadie verificaba la suya:
    # un proceso vivo pero sin responder HTTP figuraba como 'Up' y compose lo daba por bueno.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3001/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    build: ./ms-usuarios
    # Equipo 5: el build se etiqueta con la MISMA imagen que publicamos en GHCR y que
    # referencian los manifiestos de K8s. Asi compose, el push y el cluster corren el
    # mismo artefacto: se elimina el drift entre entornos. IMAGE_TAG = SHA corto del commit.
    image: ghcr.io/elcbas/ms-usuarios:${IMAGE_TAG:-0ab70dc}
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      # ---  VARIABLES PARA LA BD ---
      - DB_HOST=db-usuarios # El nombre del servicio de la BD en Docker Compose
      - DB_PORT=5432
      - DB_USER=user_usuarios
      - DB_PASSWORD=${USUARIOS_DB_PASSWORD:?Definí USUARIOS_DB_PASSWORD en tu .env raíz}
      - DB_NAME=db_usuarios
      - SERVICE_NAME=MS_Usuarios
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:-rabbit}:${RABBITMQ_DEFAULT_PASS:-rabbit}@rabbitmq:5672
      # Equipo 5: el middleware JWT agregado por el Equipo 3 necesita este secreto (config/index.js
      # no define default para jwtSecret; sin esta variable, toda validación de token fallaría).
      - JWT_SECRET=${JWT_SECRET:?Definí JWT_SECRET en tu .env raíz}
    depends_on:
      # Espera a que la BD y el broker estén SANOS, no solo encendidos (elimina la carrera de arranque)
      db-usuarios:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # --- Servicio de Agenda ---
  ms-agenda:
    # Equipo 5 (D1 de la auditoria): healthcheck propio. Antes estos servicios solo se
    # beneficiaban de la salud ajena (esperaban BD/broker sanos) pero nadie verificaba la suya:
    # un proceso vivo pero sin responder HTTP figuraba como 'Up' y compose lo daba por bueno.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3002/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    build: ./ms-agenda
    # Equipo 5: el build se etiqueta con la MISMA imagen que publicamos en GHCR y que
    # referencian los manifiestos de K8s. Asi compose, el push y el cluster corren el
    # mismo artefacto: se elimina el drift entre entornos. IMAGE_TAG = SHA corto del commit.
    image: ghcr.io/elcbas/ms-agenda:${IMAGE_TAG:-0ab70dc}
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      # ---  VARIABLES PARA LA BD, similar a ms-usuarios ---
      - DB_HOST=db-agenda # Nombre del servicio de BD
      - DB_PORT=5432
      - DB_USER=user_agenda
      - DB_PASSWORD=${AGENDA_DB_PASSWORD:?Definí AGENDA_DB_PASSWORD en tu .env raíz}
      - DB_NAME=db_agenda
      - SERVICE_NAME=MS_Agenda
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:-rabbit}:${RABBITMQ_DEFAULT_PASS:-rabbit}@rabbitmq:5672
      # Equipo 5: mismo caso que ms-usuarios — el middleware JWT del Equipo 3 requiere el secreto.
      - JWT_SECRET=${JWT_SECRET:?Definí JWT_SECRET en tu .env raíz}
    depends_on:
      db-agenda:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # --- Servicio de Message Broker ---
  rabbitmq:
    image: rabbitmq:3.13-management-alpine # Imagen con interfaz de gestión
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672" # Puerto AMQP para los servicios
      - "15672:15672" # Puerto para la interfaz web de gestión
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:?Definí RABBITMQ_DEFAULT_USER en tu .env raíz}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:?Definí RABBITMQ_DEFAULT_PASS en tu .env raíz}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  # --- Servicio de Notificaciones ---
  ms-notificaciones:
    # Equipo 5 (D1 de la auditoria): healthcheck propio. Antes estos servicios solo se
    # beneficiaban de la salud ajena (esperaban BD/broker sanos) pero nadie verificaba la suya:
    # un proceso vivo pero sin responder HTTP figuraba como 'Up' y compose lo daba por bueno.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3003/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    build: ./ms-notificaciones
    # Equipo 5: el build se etiqueta con la MISMA imagen que publicamos en GHCR y que
    # referencian los manifiestos de K8s. Asi compose, el push y el cluster corren el
    # mismo artefacto: se elimina el drift entre entornos. IMAGE_TAG = SHA corto del commit.
    image: ghcr.io/elcbas/ms-notificaciones:${IMAGE_TAG:-0ab70dc}
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:-rabbit}:${RABBITMQ_DEFAULT_PASS:-rabbit}@rabbitmq:5672 # URL de conexión a RabbitMQ
      - SERVICE_NAME=MS_Notificaciones
    depends_on:
      rabbitmq:
        condition: service_healthy # Espera a que RabbitMQ responda, no solo a que arranque

  # --- Proxy para Chaos Engineering ---
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.5.0
    container_name: toxiproxy
    restart: unless-stopped
    command: ["-host=0.0.0.0", "-config=/config/toxiproxy.json"]
    ports:
      - "8474:8474" # API de control
      - "8001:8001" # Puerto proxy para ms-usuarios
    volumes:
      - ./toxiproxy.json:/config/toxiproxy.json:ro
    depends_on:
      ms-usuarios:
        condition: service_started

  # --- Servicio de Tutorías (El Orquestador) ---
  ms-tutorias:
    # Equipo 5 (D1 de la auditoria): healthcheck propio. Antes estos servicios solo se
    # beneficiaban de la salud ajena (esperaban BD/broker sanos) pero nadie verificaba la suya:
    # un proceso vivo pero sin responder HTTP figuraba como 'Up' y compose lo daba por bueno.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    build: ./ms-tutorias
    # Equipo 5: el build se etiqueta con la MISMA imagen que publicamos en GHCR y que
    # referencian los manifiestos de K8s. Asi compose, el push y el cluster corren el
    # mismo artefacto: se elimina el drift entre entornos. IMAGE_TAG = SHA corto del commit.
    image: ghcr.io/elcbas/ms-tutorias:${IMAGE_TAG:-0ab70dc}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # --- CAMBIO CRÍTICO DE NETWORKING - Identificacion y Nombramiento de Servicios ---
      # Dentro de la red de Docker, los servicios se comunican usando su nombre de servicio,
      # no 'localhost'. Docker Compose se encarga de resolver estos nombres.
      # Ruta por defecto para PC03 Mission 2: ms-tutorias -> Toxiproxy -> ms-usuarios.
      # Para uso normal sin chaos, cambiar a: http://ms-usuarios:3001/usuarios
      - MS_USUARIOS_URL=http://toxiproxy:8001/usuarios
      - MS_AGENDA_URL=http://ms-agenda:3002/agenda
      - MS_NOTIFICACIONES_URL=http://ms-notificaciones:3003/notificaciones
      - JWT_SECRET=${JWT_SECRET:?Definí JWT_SECRET en tu .env raíz}
      # --- VARIABLES DE LA BD PARA TUTORÍAS ---
      - DB_HOST=db-tutorias
      - DB_PORT=5432
      - DB_USER=user_tutorias
      - DB_PASSWORD=${TUTORIAS_DB_PASSWORD:?Definí TUTORIAS_DB_PASSWORD en tu .env raíz}
      - DB_NAME=db_tutorias
      - SERVICE_NAME=MS_Tutorias
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:-rabbit}:${RABBITMQ_DEFAULT_PASS:-rabbit}@rabbitmq:5672 # URL de conexión a RabbitMQ
    depends_on:
      ms-auth:
        condition: service_started
      ms-usuarios:
        condition: service_started
      ms-agenda:
        condition: service_started
      ms-notificaciones:
        condition: service_started
      db-tutorias:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy # El broker sano antes de publicar eventos
      toxiproxy:
        condition: service_started # Permite enrutar ms-usuarios mediante el proxy de chaos

  # --- Cliente Web Interactivo ---
  client-sim:
    # Equipo 5 (D1 de la auditoria): healthcheck propio. Antes estos servicios solo se
    # beneficiaban de la salud ajena (esperaban BD/broker sanos) pero nadie verificaba la suya:
    # un proceso vivo pero sin responder HTTP figuraba como 'Up' y compose lo daba por bueno.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    build: ./client-mobile-sim
    container_name: client_sim_web
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # URLs que apuntan a los nombres de servicio de Docker Compose
      - API_BASE_URL=http://ms-tutorias:3000
      - AUTH_SERVICE_URL=http://ms-auth:4000/auth
    depends_on:
      ms-auth:
        condition: service_started
      ms-tutorias:
        condition: service_started

  # --- Dashboard de Trazabilidad ---
  tracking-dashboard:
    # Equipo 5 (D1 de la auditoria): healthcheck propio. Antes estos servicios solo se
    # beneficiaban de la salud ajena (esperaban BD/broker sanos) pero nadie verificaba la suya:
    # un proceso vivo pero sin responder HTTP figuraba como 'Up' y compose lo daba por bueno.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    build: ./tracking-dashboard
    container_name: tracking_dashboard
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - PORT=9000
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:?Definí RABBITMQ_DEFAULT_USER en tu .env raíz}:${RABBITMQ_DEFAULT_PASS:?Definí RABBITMQ_DEFAULT_PASS en tu .env raíz}@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy

  # --- Servicio de Base de Datos PostgreSQL ---
  db-auth:
    image: postgres:14-alpine
    container_name: db_auth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user_auth
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:?Definí AUTH_DB_PASSWORD en tu .env raíz}
      POSTGRES_DB: db_auth
    ports:
      - "5435:5432" # Puerto propio para evitar conflicto con las demás BD (5432-5434)
    volumes:
      - postgres_data_auth:/var/lib/postgresql/data
      # Equipo 5: esquema versionado y ejecutable. Postgres corre todo .sql de
      # /docker-entrypoint-initdb.d/ en la PRIMERA inicializacion del volumen, asi que un
      # 'down -v' o un clon nuevo del repo ya no dejan la base sin tablas.
      - ./docker/init/auth:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_auth -d db_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-usuarios:
    image: postgres:14-alpine # Usamos una imagen oficial de PostgreSQL
    container_name: db_usuarios_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user_usuarios # Define el usuario de la BD
      POSTGRES_PASSWORD: ${USUARIOS_DB_PASSWORD:?Definí USUARIOS_DB_PASSWORD en tu .env raíz}
      POSTGRES_DB: db_usuarios # Define el nombre de la base de datos
    ports:
      - "5432:5432" # Expone el puerto 5432 en el host y 5432 para el Postgres dentro del contenedor
    volumes:
      - postgres_data_usuarios:/var/lib/postgresql/data # Persiste los datos fuera del contenedor
      # Equipo 5: esquema versionado y ejecutable. Postgres corre todo .sql de
      # /docker-entrypoint-initdb.d/ en la PRIMERA inicializacion del volumen, asi que un
      # 'down -v' o un clon nuevo del repo ya no dejan la base sin tablas.
      - ./docker/init/usuarios:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_usuarios -d db_usuarios"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-agenda:
    image: postgres:14-alpine
    container_name: db_agenda_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user_agenda
      POSTGRES_PASSWORD: ${AGENDA_DB_PASSWORD:?Definí AGENDA_DB_PASSWORD en tu .env raíz}
      POSTGRES_DB: db_agenda
    ports:
      - "5433:5432" # Mapeamos al puerto 5433 en el host para evitar conflicto con db-usuarios (5432)
    volumes:
      - postgres_data_agenda:/var/lib/postgresql/data
      # Equipo 5: esquema versionado y ejecutable. Postgres corre todo .sql de
      # /docker-entrypoint-initdb.d/ en la PRIMERA inicializacion del volumen, asi que un
      # 'down -v' o un clon nuevo del repo ya no dejan la base sin tablas.
      - ./docker/init/agenda:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_agenda -d db_agenda"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-tutorias:
    image: postgres:14-alpine
    container_name: db_tutorias_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user_tutorias
      POSTGRES_PASSWORD: ${TUTORIAS_DB_PASSWORD:?Definí TUTORIAS_DB_PASSWORD en tu .env raíz}
      POSTGRES_DB: db_tutorias
    ports:
      - "5434:5432" # Se mapea el puerto 5434 en el host para evitar conflicto con db-usuarios (5432)
    volumes:
      - postgres_data_tutorias:/var/lib/postgresql/data
      # Equipo 5: esquema versionado y ejecutable. Postgres corre todo .sql de
      # /docker-entrypoint-initdb.d/ en la PRIMERA inicializacion del volumen, asi que un
      # 'down -v' o un clon nuevo del repo ya no dejan la base sin tablas.
      - ./docker/init/tutorias:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_tutorias -d db_tutorias"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


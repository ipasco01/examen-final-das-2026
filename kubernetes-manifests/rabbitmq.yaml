# kubernetes-manifests/rabbitmq.yaml
#
# Equipo 5 (Deployment) — issue "Datos y broker dentro del despliegue": el broker solo existía
# en Docker Compose; sin él, ningún evento de la saga ni notificación puede fluir en Kubernetes.
# StatefulSet con volumen persistente: las colas durables (incluida la DLQ del Equipo 2)
# sobreviven a un reinicio del pod. Credenciales desde el Secret app-runtime-secrets.
# Impacta al Equipo 2: validar colas, DLQ y consumer lag tras la migración.
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service # DNS interno; coincide con la RABBITMQ_URL del Secret
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      protocol: TCP
      port: 5672
      targetPort: 5672
    - name: management
      protocol: TCP
      port: 15672
      targetPort: 15672
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
spec:
  serviceName: rabbitmq-service
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine # Misma versión fijada que en docker-compose.yml
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              # Equipo 5 (20/07). Mismo caso que los 5 StatefulSets de Postgres: el endurecimiento
              # D4 se commiteo el 19/07 15:04 y el cluster no se volvio a aplicar hasta hoy, asi
              # que estuvo un dia entero roto sin que nadie lo viera.
              #
              # Aca el sintoma fue distinto y por eso se verifico aparte en vez de asumir que era
              # identico:  su-exec: setgroups: Operation not permitted
              # El entrypoint arranca como root, prepara /var/lib/rabbitmq y baja a usuario
              # rabbitmq con su-exec. `setgroups` es la llamada que fija los grupos suplementarios
              # al cambiar de usuario, y necesita CAP_SETGID. Postgres fallaba antes, en el chmod;
              # RabbitMQ llega un paso mas lejos y falla en el cambio de usuario.
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID"]

          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: app-runtime-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: app-runtime-secrets
                  key: RABBITMQ_DEFAULT_PASS
          # HALLAZGO DE VALIDACION EN CLUSTER (18/07) — timeoutSeconds explicito.
          # Sintoma: rabbitmq-0 en 0/1 con reinicios, evento
          #   'Readiness probe failed: command timed out: "rabbitmq-diagnostics -q ping"
          #    timed out after 1s'
          # Causa: 'rabbitmq-diagnostics' levanta una VM de Erlang y tarda 2-5s en responder.
          # timeoutSeconds en Kubernetes vale 1 por defecto, asi que la probe NUNCA podia pasar y
          # la liveness mataba el broker en loop. El mismo comando en docker-compose.yml si
          # funciona porque alli declaramos 'timeout: 10s' (y el default de compose es 30s).
          # Leccion: portar un healthcheck de compose a K8s no es copiar el comando; los defaults
          # de cada plataforma son distintos y el que no se declara, se pierde.
          startupProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 18   # hasta 3 minutos de arranque tolerado
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          # HALLAZGO #29 (20/07) — EL LIMITE DE CPU HACIA IMPOSIBLE LA PROBE. No era la memoria.
          #
          # Sintoma: rabbitmq-0 en CrashLoopBackOff con 26 reinicios en 6h. Los eventos repetian
          #   Startup probe failed:  command timed out: "rabbitmq-diagnostics -q ping" after 10s
          #   Liveness probe failed: command timed out: "rabbitmq-diagnostics -q ping" after 10s
          #
          # Lo que descarta las explicaciones faciles:
          #   Last State: Terminated, Reason: **Completed**, Exit Code: **0**
          # No hay OOMKilled. El broker no se cayo: se apago ordenadamente porque el kubelet le
          # mando SIGTERM al fallar la liveness. **El proceso estaba sano; lo mataron.**
          #
          # Causa: `rabbitmq-diagnostics` no es una consulta liviana -- levanta una VM de Erlang
          # ENTERA, aparte, en cada ejecucion. Con `limits.cpu: 500m` (medio nucleo) compartido con
          # el broker, Kubernetes estrangula el proceso y arrancar esa VM en menos de 10s es
          # imposible. No es una maquina lenta: se reprodujo identico en dos equipos distintos, uno
          # de ellos recien arrancado.
          #
          # POR QUE NO SE SUBE `timeoutSeconds` OTRA VEZ. Ya paso de 1 (default) a 10 en el
          # hallazgo #4. Subirlo de nuevo seria darle mas tiempo a un proceso al que le falta CPU,
          # no tiempo: taparia el sintoma y el broker seguiria estrangulado durante la operacion
          # normal, no solo durante la probe.
          #
          # Y ES EL HALLAZGO #4 POR TERCERA VEZ, con un giro: el mismo comando, el mismo servicio,
          # resultado opuesto entre compose y Kubernetes. **En compose funciona porque compose no
          # le pone limite de CPU a nada.** La diferencia entre las dos plataformas vuelve a estar
          # en algo que no se lee en el comando -- solo que esta vez la restriccion la escribi yo.
          resources:
            requests:
              cpu: 200m        # el broker en reposo ya consume mas de 100m mientras arranca Erlang
              memory: 256Mi
            limits:
              cpu: 1000m       # un nucleo: alcanza para el broker Y para la VM de diagnostico
              memory: 512Mi    # sin cambios: nunca hubo OOMKill, la memoria no era el problema
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

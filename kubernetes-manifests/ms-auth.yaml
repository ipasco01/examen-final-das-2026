# kubernetes-manifests/ms-auth.yaml
#
# Equipo 5 (Deployment) — issue "K8s operable": probes, resources y variables de BD sincronizadas
# con docker-compose.yml (antes este manifiesto no definía conexión a base de datos).
# Los probes usan /metrics (express-prom-bundle) como endpoint de salud básico; el siguiente paso,
# coordinado con el Equipo 4, es un /health que verifique dependencias.
apiVersion: v1
kind: Service
metadata:
  name: ms-auth-service # Nombre del servicio, será el DNS interno
spec:
  selector:
    app: ms-auth # Selecciona los Pods con esta etiqueta
  ports:
    - protocol: TCP
      port: 4000 # Puerto por el que el servicio es accesible
      targetPort: 4000 # Puerto en el contenedor
  type: ClusterIP # Solo accesible DENTRO del clúster
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-auth-deployment
spec:
  replicas: 1 # Queremos una sola instancia de este servicio
  selector:
    matchLabels:
      app: ms-auth
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
      labels:
        app: ms-auth # Etiqueta que el Service usa para encontrar este Pod
    spec:
      # Equipo 5 (D4 de la auditoria, mitad Kubernetes): el USER del Dockerfile es una
      # preferencia de la imagen; securityContext es la garantia del cluster. Sin runAsNonRoot,
      # una imagen que por descuido vuelva a root corre como root y nadie se entera.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000          # usuario 'node', ya existe en node:*-alpine
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: ms-auth
          image: ghcr.io/elcbas/ms-auth:0ab70dc # Equipo 5: imagen construida desde ESTE repo (commit 0ab70dc)
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]     # la app solo abre un puerto > 1024: no necesita ninguna capability

          ports:
            - containerPort: 4000
          # --- Equipo 5: chequeos de salud ---
          # Equipo 5 (20/07): las probes apuntaban a /metrics y eso fallaba por DOS causas
          # independientes -- el rate limiter devolvia 429 tras ~10 min (hallazgo #19) y los Gauges
          # del Equipo 4 consultan la BD, asi que un fallo de datos derribaba el pod (hallazgo #17).
          # Ahora apuntan a /health, que se registra ANTES del rateLimit y no toca la base.
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          # --- Equipo 5: garantías de capacidad (base para HPA futuro) ---
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          env:
            - name: PORT
              value: "4000"
            - name: SERVICE_NAME
              value: "MS_Auth"
            # --- Equipo 5 (20/07), deuda #12: OpenTelemetry ---
            # Faltaban en los 5 Deployments. `tracing.js` cae a `http://otel-collector:4317` cuando
            # no estan, y hasta hoy ese nombre no resolvia en el cluster: el exportador reintentaba
            # en silencio y no habia una sola traza. Ahora el collector existe (otel-collector.yaml)
            # y ademas se declara explicito: depender de un default que coincide por casualidad es
            # la misma clase de omision que costo los hallazgos #1 y #10.
            - name: OTEL_SERVICE_NAME
              value: "ms-auth"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-jwt-secret
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              value: "1h"
            # --- Equipo 5: BD sincronizada con el compose. El Service db-auth-service se crea en
            # el issue 3 (StatefulSets de datos); la contraseña viene del Secret
            # app-runtime-secrets, que NO se versiona (ver app-runtime-secrets.example.yaml). ---
            - name: DB_HOST
              value: "db-auth-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "user_auth"
            - name: DB_NAME
              value: "db_auth"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-runtime-secrets
                  key: AUTH_DB_PASSWORD

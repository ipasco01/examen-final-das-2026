# kubernetes-manifests/ms-notificaciones.yaml
#
# Equipo 5 (Deployment) — issue "K8s operable": probes, resources y RABBITMQ_URL sincronizada con
# docker-compose.yml (drift corregido: sin esa variable el consumidor no puede conectarse al
# broker). Probes sobre /metrics (express-prom-bundle); /health con dependencias es el siguiente
# paso, coordinado con el Equipo 4.
apiVersion: v1
kind: Service
metadata:
  name: ms-notificaciones-service # Nombre del servicio, será el DNS interno
spec:
  selector:
    app: ms-notificaciones # Selecciona los Pods con esta etiqueta
  ports:
    - protocol: TCP
      port: 3003 # Puerto por el que el servicio es accesible
      targetPort: 3003 # Puerto en el contenedor
  type: ClusterIP # Solo accesible DENTRO del clúster
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-notificaciones-deployment
spec:
  replicas: 1 # Queremos una sola instancia de este servicio
  selector:
    matchLabels:
      app: ms-notificaciones
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
      labels:
        app: ms-notificaciones # Etiqueta que el Service usa para encontrar este Pod
    spec:
      # Equipo 5 (D4 de la auditoria, mitad Kubernetes): el USER del Dockerfile es una
      # preferencia de la imagen; securityContext es la garantia del cluster. Sin runAsNonRoot,
      # una imagen que por descuido vuelva a root corre como root y nadie se entera.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000          # usuario 'node', ya existe en node:*-alpine
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: ms-notificaciones
          image: ghcr.io/elcbas/ms-notificaciones:0ab70dc # Equipo 5: imagen construida desde ESTE repo (commit 0ab70dc)
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]     # la app solo abre un puerto > 1024: no necesita ninguna capability

          ports:
            - containerPort: 3003
          # --- Equipo 5: chequeos de salud ---
          # Equipo 5 (20/07): las probes apuntaban a /metrics y eso fallaba por DOS causas
          # independientes -- el rate limiter devolvia 429 tras ~10 min (hallazgo #19) y los Gauges
          # del Equipo 4 consultan la BD, asi que un fallo de datos derribaba el pod (hallazgo #17).
          # Ahora apuntan a /health, que se registra ANTES del rateLimit y no toca la base.
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          # --- Equipo 5: garantías de capacidad (base para HPA futuro) ---
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          env:
            # --- Equipo 5 (19/07): variables de BD. El servicio incorporo su propio
            # repositorio de logs y no tenia base asignada en ningun entorno. El Service
            # db-notificaciones-service se crea en db-notificaciones.yaml; la contrasenia
            # viene del Secret app-runtime-secrets, que NO se versiona. ---
            - name: DB_HOST
              value: "db-notificaciones-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "user_notificaciones"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-runtime-secrets
                  key: NOTIFICACIONES_DB_PASSWORD
            - name: DB_NAME
              value: "db_notificaciones"
            - name: PORT
              value: "3003"
            - name: SERVICE_NAME
              value: "MS_Notificaciones"
            # --- Equipo 5 (20/07), deuda #12: OpenTelemetry ---
            # Faltaban en los 5 Deployments. `tracing.js` cae a `http://otel-collector:4317` cuando
            # no estan, y hasta hoy ese nombre no resolvia en el cluster: el exportador reintentaba
            # en silencio y no habia una sola traza. Ahora el collector existe (otel-collector.yaml)
            # y ademas se declara explicito: depender de un default que coincide por casualidad es
            # la misma clase de omision que costo los hallazgos #1 y #10.
            - name: OTEL_SERVICE_NAME
              value: "ms-notificaciones"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-jwt-secret
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              value: "1h"
            # --- Equipo 5: broker sincronizado con el compose. El Service rabbitmq-service se
            # crea en el issue 3; la URL con credenciales viene del Secret app-runtime-secrets
            # (no versionado). ---
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: app-runtime-secrets
                  key: RABBITMQ_URL

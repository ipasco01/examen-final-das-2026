# kubernetes-manifests/db-notificaciones.yaml
#
# Equipo 5 (19/07). Base AGREGADA tras detectar que ms-notificaciones incorporo
# src/config/db.js y logNotificacion.repository.js -- que escriben en 'logs_notificacion' en
# cada notificacion para deduplicar por correlation_id -- sin que existiera ninguna base para
# ese servicio, ni en compose ni aqui. Mismo patron que StatefulSet de las otras cuatro:
# identidad de red estable y volumen propio, porque el log de envios NO puede perderse en un
# reinicio: si se pierde, se re-envian correos ya enviados.
#
# Equipo 5 (Deployment) — issue "Datos y broker dentro del despliegue": antes de este cambio,
# Kubernetes solo tenía los microservicios; las bases de datos vivían únicamente en Docker
# Compose, así que ningún pod podía llegar a Ready. StatefulSet (no Deployment) porque una base
# de datos guarda estado: necesita identidad estable y almacenamiento que sobreviva reinicios
# (volumeClaimTemplates). La contraseña viene del Secret app-runtime-secrets, que NO se versiona
# (ver app-runtime-secrets.example.yaml).
# --- Equipo 5 (20/07), hallazgo #17: el esquema no existia en Kubernetes ---
#
# En compose el esquema entra por ./docker/init/notificaciones/01-schema.sql montado en
# /docker-entrypoint-initdb.d/. En Kubernetes eso NO tenia equivalente: el StatefulSet creaba el
# volumen y nadie corria el SQL nunca. Las bases quedaban vacias y ms-tutorias moria en loop con
# `relation "tutorias_notificaciones_outbox" does not exist`.
#
# Es el hallazgo #6 a medias: ahi el esquema vivia solo como texto en un .md y lo hice ejecutable
# para compose, pero nunca lo porte al otro entorno. La correccion arreglaba un entorno y dejaba el
# otro roto, que es justo lo que este PR viene senalando en el trabajo de los demas.
#
# IMPORTANTE: postgres ejecuta /docker-entrypoint-initdb.d/ SOLO cuando el directorio de datos esta
# vacio. Sobre un PVC ya inicializado esto no corre. Para aplicarlo a una base existente:
#   kubectl exec -i db-notificaciones-0 -- psql -U user_notificaciones -d db_notificaciones < docker/init/notificaciones/01-schema.sql
#
# El contenido es copia literal del archivo de la raiz. Mantenerlo sincronizado a mano es deuda:
# lo correcto seria generar el ConfigMap en un paso de build (kubectl create configmap --from-file).
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-notificaciones-init
data:
  01-schema.sql: |
    -- docker/init/notificaciones/01-schema.sql
    --
    -- David: este archivo tampoco existía. Es el "molde" de la tabla donde
    -- Beto va a anotar cada correo que manda. El UNIQUE en correlation_id es
    -- lo que hace posible la deduplicación de forma robusta: aunque el
    -- código de JS tenga una carrera (dos intentos casi al mismo tiempo), la
    -- propia base de datos rechaza el segundo INSERT si el correlation_id
    -- se repite.
    CREATE TABLE IF NOT EXISTS logs_notificacion (
        log_id UUID PRIMARY KEY,
        correlation_id VARCHAR(255) NOT NULL UNIQUE,
        canal VARCHAR(50) NOT NULL,
        destinatario VARCHAR(255) NOT NULL,
        estado VARCHAR(100) NOT NULL,
        timestamp TIMESTAMPTZ NOT NULL
    );
---
apiVersion: v1
kind: Service
metadata:
  name: db-notificaciones-service # DNS interno; coincide con DB_HOST en ms-auth.yaml
spec:
  selector:
    app: db-notificaciones
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-notificaciones
spec:
  serviceName: db-notificaciones-service
  replicas: 1
  selector:
    matchLabels:
      app: db-notificaciones
  template:
    metadata:
      labels:
        app: db-notificaciones
    spec:
      containers:
        - name: postgres
          image: postgres:14-alpine # Misma versión fijada que en docker-compose.yml
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              # Equipo 5 (20/07). `drop: ["ALL"]` a secas rompia este StatefulSet, y el fallo
              # estuvo latente un dia entero: el endurecimiento se commiteo el 19/07 15:04 pero
              # el cluster no se volvio a aplicar hasta hoy, asi que los pods que se veian
              # Running eran de ANTES del cambio. Escrito, revisado y documentado como hecho --
              # nunca ejecutado. Es el hallazgo #7 (el CrashLoopBackOff del Equipo 2) repetido,
              # esta vez sobre mi propio trabajo.
              #
              # El entrypoint de postgres arranca como root para preparar el directorio de datos
              # (chown/chmod sobre el volumen montado) y recien despues baja a usuario postgres.
              # Sin estas capabilities el chmod falla con "Operation not permitted" y el
              # contenedor muere en loop. Se devuelve el minimo necesario, no se afloja el drop:
              #   CHOWN + FOWNER    -> ajustar dueño y permisos de /var/lib/postgresql/data
              #   DAC_OVERRIDE      -> leer/escribir archivos del volumen creados por otro uid
              #   SETUID + SETGID   -> el su-exec que cambia de root a postgres
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID"]

          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "user_notificaciones"
            - name: POSTGRES_DB
              value: "db_notificaciones"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-runtime-secrets
                  key: NOTIFICACIONES_DB_PASSWORD
            # Subdirectorio para los datos: evita el conflicto de Postgres con la carpeta
            # lost+found que algunos provisionadores crean en la raíz del volumen.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "user_notificaciones", "-d", "db_notificaciones"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "user_notificaciones", "-d", "db_notificaciones"]
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            # Solo lectura: el contenedor no debe poder modificar el esquema.
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: db-notificaciones-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: init
          configMap:
            name: db-notificaciones-init
  volumeClaimTemplates:
    - metadata:
        name: db-notificaciones-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

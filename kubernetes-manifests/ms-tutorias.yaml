# kubernetes-manifests/ms-tutorias.yaml
#
# Equipo 5 (Deployment) — issue "K8s operable": probes, resources y variables de BD y broker
# sincronizadas con docker-compose.yml (drift corregido: este manifiesto no tenía DB_* ni
# RABBITMQ_URL, así que el servicio no podía conectarse a sus dependencias). Probes sobre
# /metrics (express-prom-bundle); /health con dependencias es el siguiente paso con el Equipo 4.
# Nota: en Kubernetes no hay Toxiproxy; ms-usuarios se llama directo por su Service.
apiVersion: v1
kind: Service
metadata:
  name: ms-tutorias-service
  annotations:
    # Protege este backend específico con el plugin JWT (ver main-ingress.yaml para el porqué de
    # anotar el Service en vez del Ingress).
    konghq.com/plugins: jwt-validation-plugin
spec:
  selector:
    app: ms-tutorias
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-tutorias-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-tutorias
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
      labels:
        app: ms-tutorias
    spec:
      # Equipo 5 (D4 de la auditoria, mitad Kubernetes): el USER del Dockerfile es una
      # preferencia de la imagen; securityContext es la garantia del cluster. Sin runAsNonRoot,
      # una imagen que por descuido vuelva a root corre como root y nadie se entera.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000          # usuario 'node', ya existe en node:*-alpine
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: ms-tutorias
          image: ghcr.io/elcbas/ms-tutorias:0ab70dc # Equipo 5: imagen construida desde ESTE repo (commit 0ab70dc)
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]     # la app solo abre un puerto > 1024: no necesita ninguna capability

          ports:
            - containerPort: 3000
          # --- Equipo 5: chequeos de salud ---
          # NOTA (hallazgo de validacion): ms-tutorias es el UNICO servicio que, ademas del
          # servidor HTTP, arranca tres procesos de fondo en app.js (messageProducer.connect,
          # outboxPublisher.start, compensacionWorker.start). En la validacion local su /metrics
          # tardo notablemente mas que el de los otros cuatro microservicios.
          # Por eso aqui: (a) startupProbe que le da hasta 60s para terminar de arrancar sin que
          # la liveness lo mate en loop, y (b) timeoutSeconds explicito en las tres sondas.
          # Mejora pendiente (issue abierto): exponer un /health liviano propio, independiente del
          # scrape de metricas, para no acoplar la disponibilidad del pod al endpoint de Prometheus.
          startupProbe:
            httpGet:
              path: /metrics
              port: 3000
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12   # 12 x 5s = hasta 60s de arranque tolerado
          readinessProbe:
            httpGet:
              path: /metrics
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /metrics
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          # --- Equipo 5: garantías de capacidad (base para HPA futuro) ---
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          env:
            - name: PORT
              value: "3000"
            - name: SERVICE_NAME
              value: "MS_Tutorias"
            # --- Equipo 5 (20/07), deuda #12: OpenTelemetry ---
            # Faltaban en los 5 Deployments. `tracing.js` cae a `http://otel-collector:4317` cuando
            # no estan, y hasta hoy ese nombre no resolvia en el cluster: el exportador reintentaba
            # en silencio y no habia una sola traza. Ahora el collector existe (otel-collector.yaml)
            # y ademas se declara explicito: depender de un default que coincide por casualidad es
            # la misma clase de omision que costo los hallazgos #1 y #10.
            - name: OTEL_SERVICE_NAME
              value: "ms-tutorias"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-jwt-secret
                  key: JWT_SECRET
            # --- NETWORKING EN KUBERNETES ---
            # Kubernetes tiene su propio DNS. Los servicios se comunican usando el nombre
            # del 'Service' que definimos y su puerto. Ya no es 'localhost' ni el nombre de Docker Compose.
            - name: MS_USUARIOS_URL
              value: "http://ms-usuarios-service:3001/usuarios"
            - name: MS_AGENDA_URL
              value: "http://ms-agenda-service:3002/agenda"
            # MS_NOTIFICACIONES_URL eliminada el 20/07: ningun codigo la lee. ms-tutorias no le
            # habla a ms-notificaciones por HTTP sino por RabbitMQ (outbox). Mantenerla sugeria una
            # dependencia directa entre los dos servicios que no existe, y eso se lee mal en un
            # manifiesto: alguien podria creer que hay una llamada sincrona que hay que proteger.
            # --- Equipo 5: BD y broker sincronizados con el compose. Los Services
            # db-tutorias-service y rabbitmq-service se crean en el issue 3; los valores
            # sensibles vienen del Secret app-runtime-secrets (no versionado). ---
            - name: DB_HOST
              value: "db-tutorias-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "user_tutorias"
            - name: DB_NAME
              value: "db_tutorias"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-runtime-secrets
                  key: TUTORIAS_DB_PASSWORD
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: app-runtime-secrets
                  key: RABBITMQ_URL

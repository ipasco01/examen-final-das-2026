# kubernetes-manifests/db-tutorias.yaml
#
# Equipo 5 (Deployment) — issue "Datos y broker dentro del despliegue". Ver el comentario
# completo del patrón en db-auth.yaml: StatefulSet + volumen persistente + contraseña desde el
# Secret app-runtime-secrets (no versionado). Esta base guarda además las tablas de outbox y
# compensaciones del Equipo 1: su persistencia protege la saga.
# --- Equipo 5 (20/07), hallazgo #17: el esquema no existia en Kubernetes ---
#
# En compose el esquema entra por ./docker/init/tutorias/01-schema.sql montado en
# /docker-entrypoint-initdb.d/. En Kubernetes eso NO tenia equivalente: el StatefulSet creaba el
# volumen y nadie corria el SQL nunca. Las bases quedaban vacias y ms-tutorias moria en loop con
# `relation "tutorias_notificaciones_outbox" does not exist`.
#
# Es el hallazgo #6 a medias: ahi el esquema vivia solo como texto en un .md y lo hice ejecutable
# para compose, pero nunca lo porte al otro entorno. La correccion arreglaba un entorno y dejaba el
# otro roto, que es justo lo que este PR viene senalando en el trabajo de los demas.
#
# IMPORTANTE: postgres ejecuta /docker-entrypoint-initdb.d/ SOLO cuando el directorio de datos esta
# vacio. Sobre un PVC ya inicializado esto no corre. Para aplicarlo a una base existente:
#   kubectl exec -i db-tutorias-0 -- psql -U user_tutorias -d db_tutorias < docker/init/tutorias/01-schema.sql
#
# El contenido es copia literal del archivo de la raiz. Mantenerlo sincronizado a mano es deuda:
# lo correcto seria generar el ConfigMap en un paso de build (kubectl create configmap --from-file).
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-tutorias-init
data:
  01-schema.sql: |
    -- docker/init/tutorias/01-schema.sql — base db_tutorias (ms-tutorias, orquestador de la Saga)
    -- Equipo 5 (Deployment). Se ejecuta solo en la primera inicialización del volumen.
    -- Ver docker/init/auth/01-schema.sql para el razonamiento completo.
    --
    -- Esta es la base más crítica del sistema: además de las tutorías, guarda el outbox y las
    -- compensaciones pendientes del Equipo 1. Si estas tablas no existen:
    --   - la Saga no puede registrar compensaciones y una reserva de agenda queda huérfana;
    --   - los Gauges de backlog.metrics.js (Equipo 4) consultan estas tablas EN CADA SCRAPE de
    --     Prometheus, así que GET /metrics devuelve 500 -- y ese endpoint es el objetivo de las
    --     probes de readiness y liveness en kubernetes-manifests/ms-tutorias.yaml.
    -- Es decir: sin esquema, el pod de ms-tutorias nunca llega a Ready.

    CREATE EXTENSION IF NOT EXISTS pgcrypto;

    CREATE TABLE IF NOT EXISTS tutorias (
        idTutoria UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        idEstudiante VARCHAR(50) NOT NULL,
        idTutor VARCHAR(50) NOT NULL,
        -- Denormalización del nombre ya resuelto contra ms-usuarios en el paso 1 de la Saga.
        nombreTutor VARCHAR(255),
        materia VARCHAR(255),
        fecha TIMESTAMPTZ NOT NULL,
        estado VARCHAR(50) NOT NULL CHECK (estado IN ('PENDIENTE', 'CONFIRMADA', 'FALLIDA', 'CANCELADA')),
        createdAt TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP,
        updatedAt TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP,
        error VARCHAR(500),
        -- POST /v1/tutorias exige el header Idempotency-Key; se persiste acá para deduplicar
        -- reintentos del cliente.
        idempotencyKey VARCHAR(255) UNIQUE,
        -- Necesario para liberar el horario en ms-agenda al cancelar: antes solo vivía en memoria
        -- durante la Saga, así que un reinicio perdía la referencia al bloqueo.
        idBloqueo UUID
    );

    CREATE INDEX IF NOT EXISTS idx_tutorias_idEstudiante ON tutorias(idEstudiante);
    CREATE INDEX IF NOT EXISTS idx_tutorias_idTutor ON tutorias(idTutor);
    CREATE INDEX IF NOT EXISTS idx_tutorias_estado ON tutorias(estado);

    CREATE OR REPLACE FUNCTION trigger_set_timestamp()
    RETURNS TRIGGER AS $$
    BEGIN
        NEW.updatedAt = NOW();
        RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    DROP TRIGGER IF EXISTS set_timestamp ON tutorias;
    CREATE TRIGGER set_timestamp
    BEFORE UPDATE ON tutorias
    FOR EACH ROW
    EXECUTE PROCEDURE trigger_set_timestamp();

    -- Patrón outbox (Equipo 1): la confirmación de la tutoría y el encolado de su notificación se
    -- confirman en la MISMA transacción (tutoria.repository.js#save + outbox.repository.js). Un
    -- poller (outbox.publisher.js) publica las filas PENDIENTE en notificaciones_email_queue.
    -- Por esto db-tutorias necesita volumen persistente en Kubernetes: sin él, un reinicio pierde
    -- notificaciones ya comprometidas al usuario.
    CREATE TABLE IF NOT EXISTS tutorias_notificaciones_outbox (
        idOutbox UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        idTutoria UUID NOT NULL REFERENCES tutorias(idTutoria),
        payload JSONB NOT NULL,
        estado VARCHAR(20) NOT NULL DEFAULT 'PENDIENTE' CHECK (estado IN ('PENDIENTE', 'PUBLICADO', 'FALLIDO')),
        intentos INTEGER NOT NULL DEFAULT 0,
        createdAt TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP,
        publishedAt TIMESTAMPTZ,
        ultimoError VARCHAR(500)
    );

    -- Lo usa el poller y también el Gauge outbox_notificaciones_backlog: el COUNT por estado va por
    -- índice, no hace seq scan en cada scrape de Prometheus.
    CREATE INDEX IF NOT EXISTS idx_outbox_estado ON tutorias_notificaciones_outbox(estado);

    -- Compensación de agenda pendiente (Equipo 1): si el loop de reintentos síncronos agota sus
    -- intentos al desbloquear agenda, se registra acá en la misma transacción que el UPDATE a
    -- FALLIDA, en vez de publicarse a una cola sin consumidor. compensacion.worker.js reclama las
    -- filas PENDIENTE y reintenta agendaClient.cancelarBloqueo en segundo plano.
    CREATE TABLE IF NOT EXISTS compensaciones_pendientes (
        idCompensacion UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        idBloqueo UUID NOT NULL,
        idTutoria UUID NOT NULL REFERENCES tutorias(idTutoria),
        idTutor VARCHAR(50) NOT NULL,
        correlationId VARCHAR(255),
        motivo VARCHAR(500),
        estado VARCHAR(20) NOT NULL DEFAULT 'PENDIENTE' CHECK (estado IN ('PENDIENTE', 'RESUELTO', 'FALLIDO')),
        intentos INTEGER NOT NULL DEFAULT 0,
        createdAt TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP,
        resolvedAt TIMESTAMPTZ,
        ultimoError VARCHAR(500)
    );

    CREATE INDEX IF NOT EXISTS idx_compensaciones_pendientes_estado ON compensaciones_pendientes(estado);

---
apiVersion: v1
kind: Service
metadata:
  name: db-tutorias-service # DNS interno; coincide con DB_HOST en ms-tutorias.yaml
spec:
  selector:
    app: db-tutorias
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-tutorias
spec:
  serviceName: db-tutorias-service
  replicas: 1
  selector:
    matchLabels:
      app: db-tutorias
  template:
    metadata:
      labels:
        app: db-tutorias
    spec:
      containers:
        - name: postgres
          image: postgres:14-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              # Equipo 5 (20/07). `drop: ["ALL"]` a secas rompia este StatefulSet, y el fallo
              # estuvo latente un dia entero: el endurecimiento se commiteo el 19/07 15:04 pero
              # el cluster no se volvio a aplicar hasta hoy, asi que los pods que se veian
              # Running eran de ANTES del cambio. Escrito, revisado y documentado como hecho --
              # nunca ejecutado. Es el hallazgo #7 (el CrashLoopBackOff del Equipo 2) repetido,
              # esta vez sobre mi propio trabajo.
              #
              # El entrypoint de postgres arranca como root para preparar el directorio de datos
              # (chown/chmod sobre el volumen montado) y recien despues baja a usuario postgres.
              # Sin estas capabilities el chmod falla con "Operation not permitted" y el
              # contenedor muere en loop. Se devuelve el minimo necesario, no se afloja el drop:
              #   CHOWN + FOWNER    -> ajustar dueño y permisos de /var/lib/postgresql/data
              #   DAC_OVERRIDE      -> leer/escribir archivos del volumen creados por otro uid
              #   SETUID + SETGID   -> el su-exec que cambia de root a postgres
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID"]

          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "user_tutorias"
            - name: POSTGRES_DB
              value: "db_tutorias"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-runtime-secrets
                  key: TUTORIAS_DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "user_tutorias", "-d", "db_tutorias"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "user_tutorias", "-d", "db_tutorias"]
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            # Solo lectura: el contenedor no debe poder modificar el esquema.
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: db-tutorias-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: init
          configMap:
            name: db-tutorias-init
  volumeClaimTemplates:
    - metadata:
        name: db-tutorias-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
